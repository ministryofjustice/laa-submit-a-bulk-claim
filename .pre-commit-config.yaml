repos:
  # Local hooks for Gradle tasks
  - repo: local
    hooks:
      - id: spotless
        name: Spotless Code Formatting
        description: Apply code formatting to staged Java files using Spotless
        entry: ./gradlew
        language: system
        args: [ "spotlessApply", "--quiet" ]
        types: [ java ]
        pass_filenames: false
        always_run: true

      - id: checkstyle
        name: Checkstyle Validation
        description: Run Checkstyle validation on staged Java files
        entry: ./gradlew
        language: system
        args: [ "checkstyleAll", "--quiet" ]
        types: [ java ]
        pass_filenames: false

      - id: github-actions-sha-pinning
        name: GitHub Actions SHA Pinning
        description: Require external actions to be pinned to full-length commit SHAs
        entry: scripts/check-github-actions-sha-pinning.sh
        language: system
        pass_filenames: false
        always_run: true

  - repo: https://github.com/ministryofjustice/devsecops-hooks
    rev: v1.4.0
    hooks:
      - id: baseline
