name: Test using E2E dispatch

on:
  pull_request:

permissions:
  contents: read

jobs:
  define-preview-version:
    runs-on: ubuntu-latest
    outputs:
      preview_version: ${{ steps.get-preview-version.outputs.preview_version }}
    steps:
      - uses: actions/checkout@v6
      - name: Get preview version
        id: get-preview-version
        run: |
          set -euo pipefail
          commit_hash=$(git rev-parse --short HEAD)
          version=$(awk -F= '/^version=/{print $2}' gradle.properties)
          echo "preview_version=${version}-${commit_hash}" >> "$GITHUB_OUTPUT"
          echo "Preview version: submit-a-bulk-claim-${version}-${commit_hash}"

  dispatch-and-wait:
    needs: define-preview-version
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Dispatch target workflow
        id: dispatch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_REF: feature/test-compose
          TARGET_SHA: ${{ github.event.pull_request.head.sha }}
          SABC_IMAGE_TAG: ${{ needs.define-preview-version.outputs.preview_version }}
          TEST_ANNOTATION: '@accessibility'
        run: |
          set -euo pipefail

          echo "Dispatching ${TARGET_WORKFLOW_FILE} in ${TARGET_REPO}"
          gh api -X POST "repos/ministryofjustice/bulk-submission-and-fee-scheme-tests-/actions/workflows/test-compose.yml/dispatches" \
            -f ref="${TARGET_REF}" \
            -f inputs[test_annotation]="${TEST_ANNOTATION}" \
            -f inputs[sabc_image_tag]="${SABC_IMAGE_TAG}"

          echo "Dispatched for ref ${TARGET_REF} at sha ${TARGET_SHA}"

      - name: Find the created workflow run
        id: find_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_REPO: ministryofjustice/bulk-submission-and-fee-scheme-tests-
          TARGET_WORKFLOW_FILE: test-compose.yml
          TARGET_REF: feature/test-compose
          TARGET_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          WORKFLOW_ID="$(gh api "repos/${TARGET_REPO}/actions/workflows/${TARGET_WORKFLOW_FILE}" --jq '.id')"

          echo "Looking for run for sha ${TARGET_SHA}"
          for i in {1..30}; do
            RUN_ID="$(gh api \
              "repos/${TARGET_REPO}/actions/workflows/${WORKFLOW_ID}/runs?branch=${TARGET_REF}&event=workflow_dispatch&per_page=20" \
              --jq ".workflow_runs[] | select(.head_sha == \"${TARGET_SHA}\") | .id" | head -n 1)"

            if [ -n "${RUN_ID:-}" ]; then
              echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"
              echo "Found run ${RUN_ID}"
              exit 0
            fi

            sleep 5
          done

          echo "Timed out waiting for workflow run to appear"
          exit 1

      - name: Poll until completion
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_REPO: ministryofjustice/bulk-submission-and-fee-scheme-tests-
          RUN_ID: ${{ steps.find_run.outputs.run_id }}
        run: |
          set -euo pipefail

          for i in {1..120}; do
            STATUS="$(gh api "repos/${TARGET_REPO}/actions/runs/${RUN_ID}" --jq '.status')"
            CONCLUSION="$(gh api "repos/${TARGET_REPO}/actions/runs/${RUN_ID}" --jq '.conclusion // empty')"
            URL="$(gh api "repos/${TARGET_REPO}/actions/runs/${RUN_ID}" --jq '.html_url')"

            echo "status=${STATUS}, conclusion=${CONCLUSION:-none}"
            echo "run_url=${URL}"

            if [ "${STATUS}" = "completed" ]; then
              if [ "${CONCLUSION}" = "success" ]; then
                echo "Remote workflow succeeded"
                exit 0
              fi

              echo "Remote workflow failed: ${CONCLUSION:-unknown}"
              exit 1
            fi

            sleep 10
          done

          echo "Timed out waiting for remote workflow to complete"
          exit 1