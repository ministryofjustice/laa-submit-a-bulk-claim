name: Deploy UAT preview (branch)

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  define-preview-version:
    runs-on: ubuntu-latest
    outputs:
      preview_version: ${{ steps.get-preview-version.outputs.preview_version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Get preview version
        id: get-preview-version
        run: |
          set -euo pipefail
          commit_hash=$(git rev-parse --short HEAD)
          version=$(awk -F= '/^version=/{print $2}' gradle.properties)
          echo "preview_version=${version}-${commit_hash}" >> "$GITHUB_OUTPUT"
          echo "Preview version: submit-a-bulk-claim-${version}-${commit_hash}"

  test-accessibility:
    name: Test @accessibility
    needs: [ define-preview-version ]
    uses: ./.github/workflows/test-e2e.yml
    permissions:
      contents: read
      id-token: write
    with:
      sabc_image_tag: ${{ needs.define-preview-version.outputs.preview_version }}
      test_annotation: "@accessibility"
    secrets:
      gh_token: ${{ secrets.E2E_PAT_TOKEN }}

  test-search:
    name: Test @search
    needs: [ define-preview-version ]
    uses: ./.github/workflows/test-e2e.yml
    permissions:
      contents: read
      id-token: write
    with:
      sabc_image_tag: submit-a-bulk-claim-${{ needs.define-preview-version.outputs.preview_version }}
      test_annotation: "@search"
    secrets:
      gh_token: ${{ secrets.E2E_PAT_TOKEN }}

  build-and-test:
    needs: [ define-preview-version ]
    uses: ministryofjustice/laa-ccms-common-workflows/.github/workflows/gradle-build-and-publish.yml@v2
    permissions:
      contents: write
      packages: write
    with:
      publish_package: false
      override_version: ${{ needs.define-preview-version.outputs.preview_version }}
      integration_test_task: integrationTest
      semgrep_check: 'false'
      java_version: 25
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}

  pact-test:
    needs: [ define-preview-version ]
    uses: ministryofjustice/laa-ccms-common-workflows/.github/workflows/pact-and-publish.yml@v2
    permissions:
      contents: write
      packages: write
    with:
      pacticipant_name: "laa-submit-a-bulk-claim"
      pact_test_task: "pactTest"
      publish_pact_results: true
      enable_can_i_merge: true
      provider_name: "laa-data-claims-api"
      pact_tags: "feature"
      java_version: 25
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}
      pact_broker_url: 'https://laa-data-pact-broker.apps.live.cloud-platform.service.justice.gov.uk/'
      pact_broker_username: ${{ secrets.PACT_BROKER_USERNAME }}
      pact_broker_password: ${{ secrets.PACT_BROKER_PASSWORD }}

  accessibility-test:
    needs: [ define-preview-version ]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      PLAYWRIGHT_BROWSERS_PATH: /home/runner/.cache/ms-playwright
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
  
      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'
  
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: /home/runner/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-1.56.0
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Chromium dependencies
        run: npx --yes playwright@1.56.0 install-deps chromium

      - name: Install Playwright Chromium browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx --yes playwright@1.56.0 install chromium
  
      - name: Run accessibility test suite
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew :laa-submit-a-bulk-claim-ui:accessibilityTest --no-daemon
  
      - name: Upload accessibility test artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: accessibility-test-results-uat-preview
          path: |
            laa-submit-a-bulk-claim-ui/build/test-results/accessibilityTest
            laa-submit-a-bulk-claim-ui/build/reports/tests/accessibilityTest
            laa-submit-a-bulk-claim-ui/build/reports/accessibility
          if-no-files-found: warn

  ecr-publish-image:
    needs: [ build-and-test ]
    uses: ministryofjustice/laa-ccms-common-workflows/.github/workflows/ecr-publish-image.yml@v2
    permissions:
      contents: read
      id-token: write
      security-events: write
    with:
      jar_subproject: 'laa-submit-a-bulk-claim-ui'
      image_version: ${{ format('{0}-{1}', vars.IMAGE_PREFIX, needs.build-and-test.outputs.published_artifact_version) }}
      java_version: 25
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}
      ecr_repository: ${{ vars.LAA_SUBMIT_A_BULK_CLAIM_ECR_REPOSITORY }}
      ecr_region: ${{ vars.LAA_SUBMIT_A_BULK_CLAIM_ECR_REGION }}
      ecr_role_to_assume: ${{ secrets.LAA_SUBMIT_A_BULK_CLAIM_ECR_ROLE_TO_ASSUME }}
      snyk_token: ${{ secrets.SNYK_TOKEN }}



  deploy-uat-preview:
    needs:
      - pact-test
      - ecr-publish-image
      - accessibility-test
    runs-on: ubuntu-latest
    environment: uat
    permissions:
      id-token: write
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Deploy UAT preview branch
        id: deploy
        uses: ./.github/actions/deploy_branch
        with:
          ecr-region: ${{ vars.LAA_SUBMIT_A_BULK_CLAIM_ECR_REGION }}
          ecr-role-to-assume: ${{ secrets.LAA_SUBMIT_A_BULK_CLAIM_ECR_ROLE_TO_ASSUME }}
          ecr-repository: ${{ vars.LAA_SUBMIT_A_BULK_CLAIM_ECR_REPOSITORY }}
          oidc-ecr-repository: ${{ vars.LAA_OIDC_MOCK_SERVER_ECR_REPOSITORY }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          app-environment: uat
          image-tag: ${{ needs.ecr-publish-image.outputs.published_image_version }}
          oidc-mock-image-tag: 'latest'
          pact_broker_url: 'https://laa-data-pact-broker.apps.live.cloud-platform.service.justice.gov.uk/'
          pact_broker_username: ${{ secrets.pact_broker_username }}
          pact_broker_password: ${{ secrets.pact_broker_password }}
          run-pact-can-i-deploy: false

      - name: Comment on PR with UI ingress URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const releaseName = '${{ steps.deploy.outputs.release-name }}';
            const namespace = '${{ secrets.KUBE_NAMESPACE }}';
            const clusterDomain = 'apps.live.cloud-platform.service.justice.gov.uk';
            const chartName = 'submit-a-bulk-claim';
            const hostname = `${releaseName}-${chartName}-${namespace}.${clusterDomain}`;
            const url = `https://${hostname}`;

            const prNumber = context.issue.number;
            if (!prNumber) {
              console.log('No PR found, skipping comment');
              return;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });

            const commentBody = [
              '## Ephemeral Environment Deployed',
              '',
              `**UI URL:** ${url}`,
              '',
              `**Release:** ${releaseName}`
            ].join('\n');
            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('## Ephemeral Environment Deployed') &&
              comment.body.includes(hostname)
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
              console.log(`Updated existing comment #${botComment.id} on PR #${prNumber}`);
            } else {
              await github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: commentBody
              });
              console.log(`Posted new comment to PR #${prNumber}`);
            }
