name: Deploy UAT preview (branch)

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  define-preview-version:
    runs-on: ubuntu-latest
    outputs:
      preview_version: ${{ steps.get-preview-version.outputs.preview_version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Compute version
        id: compute
        uses: ministryofjustice/laa-ccms-common-workflows/.github/actions/compute-version@4daa796eff475c7a107e17daf4e4882b8a1b949b # v2.3.0
      - name: Get preview version
        id: get-preview-version
        shell: bash
        env:
          BUMP_TYPE: ${{ steps.compute.outputs.bump_type }}
          MAJOR:     ${{ steps.compute.outputs.major }}
          MINOR:     ${{ steps.compute.outputs.minor }}
          PATCH:     ${{ steps.compute.outputs.patch }}
        run: |
          set -euo pipefail
          BUMP="${BUMP_TYPE:-none}"
          M="${MAJOR:-0}"; N="${MINOR:-0}"; P="${PATCH:-0}"
          if [[ "$BUMP" == "none" ]]; then P=$((P+1)); fi
          commit_hash=$(git rev-parse --short HEAD)
          version="${M}.${N}.${P}-SNAPSHOT-${commit_hash}"
          echo "preview_version=${version}" >> "$GITHUB_OUTPUT"
          echo "Preview version: submit-a-bulk-claim-${version}"

  test-smoke:
    name: Test @smoke
    needs: [ define-preview-version ]
    uses: ministryofjustice/bulk-submission-and-fee-scheme-tests-/.github/workflows/trigger-e2e-dispatch.yml@bb8c62731903909f477ced8396ec5b8e41c8c62b # 17/04/2026
    permissions:
      contents: read
      id-token: write
    with:
      sabc_image_tag: submit-a-bulk-claim-${{ needs.define-preview-version.outputs.preview_version }}
      test_annotation: "@smoke"
      pr_number: ${{ github.event.number }}
      github_app_organisation: 'ministryofjustice'
    secrets:
      github_app_id: ${{ vars.LAA_CCMS_CAAB_SERVICE_APP_ID }}
      github_app_private_key: ${{ secrets.LAA_CCMS_CAAB_SERVICE_KEY }}

  build-and-test:
    needs: [ define-preview-version ]
    uses: ministryofjustice/laa-ccms-common-workflows/.github/workflows/gradle-build-and-publish.yml@4daa796eff475c7a107e17daf4e4882b8a1b949b # v2.3.0
    permissions:
      contents: write
      packages: write
    with:
      override_version: ${{ needs.define-preview-version.outputs.preview_version }}
      build_command: ':laa-submit-a-bulk-claim-ui:assemble'
      integration_test_task: integrationTest
      semgrep_check: 'true'
      java_version: 25
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}

  pact-test:
    needs: [ define-preview-version ]
    uses: ministryofjustice/laa-ccms-common-workflows/.github/workflows/pact-and-publish.yml@4daa796eff475c7a107e17daf4e4882b8a1b949b # v2.3.0
    permissions:
      contents: write
      packages: write
    with:
      pacticipant_name: "laa-submit-a-bulk-claim"
      pact_test_task: "pactTest"
      publish_pact_results: true
      enable_can_i_merge: true
      provider_name: "laa-data-claims-api"
      pact_tags: "feature"
      java_version: 25
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}
      pact_broker_url: 'https://laa-data-pact-broker.apps.live.cloud-platform.service.justice.gov.uk/'
      pact_broker_username: ${{ secrets.PACT_BROKER_USERNAME }}
      pact_broker_password: ${{ secrets.PACT_BROKER_PASSWORD }}

  accessibility-test:
    needs: [ define-preview-version ]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      PLAYWRIGHT_BROWSERS_PATH: /home/runner/.cache/ms-playwright
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
  
      - name: Set up Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
  
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /home/runner/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-1.56.0
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Chromium dependencies
        run: npx --yes playwright@1.56.0 install-deps chromium

      - name: Install Playwright Chromium browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx --yes playwright@1.56.0 install chromium
  
      - name: Run accessibility test suite
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew :laa-submit-a-bulk-claim-ui:accessibilityTest --no-daemon
  
      - name: Upload accessibility test artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: accessibility-test-results-uat-preview
          path: |
            laa-submit-a-bulk-claim-ui/build/test-results/accessibilityTest
            laa-submit-a-bulk-claim-ui/build/reports/tests/accessibilityTest
            laa-submit-a-bulk-claim-ui/build/reports/accessibility
          if-no-files-found: warn

  ecr-publish-image:
    needs: [ build-and-test ]
    uses: ministryofjustice/laa-ccms-common-workflows/.github/workflows/ecr-publish-image.yml@4daa796eff475c7a107e17daf4e4882b8a1b949b # v2.3.0
    permissions:
      contents: read
      id-token: write
      security-events: write
    with:
      jar_subproject: 'laa-submit-a-bulk-claim-ui'
      image_version: ${{ format('{0}-{1}', vars.IMAGE_PREFIX, needs.build-and-test.outputs.published_artifact_version) }}
      java_version: 25
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}
      ecr_repository: ${{ vars.LAA_SUBMIT_A_BULK_CLAIM_ECR_REPOSITORY }}
      ecr_region: ${{ vars.LAA_SUBMIT_A_BULK_CLAIM_ECR_REGION }}
      ecr_role_to_assume: ${{ secrets.LAA_SUBMIT_A_BULK_CLAIM_ECR_ROLE_TO_ASSUME }}
      snyk_client_id: ${{ secrets.SNYK_CLIENT_ID }}
      snyk_client_secret: ${{ secrets.SNYK_CLIENT_SECRET }}



  deploy-uat-preview:
    needs:
      - pact-test
      - ecr-publish-image
      - accessibility-test
    runs-on: ubuntu-latest
    environment: uat
    permissions:
      id-token: write
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Deploy UAT preview branch
        id: deploy
        uses: ./.github/actions/deploy_branch
        with:
          ecr-region: ${{ vars.LAA_SUBMIT_A_BULK_CLAIM_ECR_REGION }}
          ecr-role-to-assume: ${{ secrets.LAA_SUBMIT_A_BULK_CLAIM_ECR_ROLE_TO_ASSUME }}
          ecr-repository: ${{ vars.LAA_SUBMIT_A_BULK_CLAIM_ECR_REPOSITORY }}
          oidc-ecr-repository: ${{ vars.LAA_OIDC_MOCK_SERVER_ECR_REPOSITORY }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          app-environment: uat
          image-tag: ${{ needs.ecr-publish-image.outputs.published_image_version }}
          oidc-mock-image-tag: 'latest'
          pact_broker_url: 'https://laa-data-pact-broker.apps.live.cloud-platform.service.justice.gov.uk/'
          pact_broker_username: ${{ secrets.pact_broker_username }}
          pact_broker_password: ${{ secrets.pact_broker_password }}
          run-pact-can-i-deploy: false

      - name: Comment on PR with UI ingress URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const releaseName = '${{ steps.deploy.outputs.release-name }}';
            const namespace = '${{ secrets.KUBE_NAMESPACE }}';
            const clusterDomain = 'apps.live.cloud-platform.service.justice.gov.uk';
            const chartName = 'submit-a-bulk-claim';
            const hostname = `${releaseName}-${chartName}-${namespace}.${clusterDomain}`;
            const url = `https://${hostname}`;

            const prNumber = context.issue.number;
            if (!prNumber) {
              console.log('No PR found, skipping comment');
              return;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });

            const commentBody = [
              '## Ephemeral Environment Deployed',
              '',
              `**UI URL:** ${url}`,
              '',
              `**Release:** ${releaseName}`
            ].join('\n');
            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('## Ephemeral Environment Deployed') &&
              comment.body.includes(hostname)
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
              console.log(`Updated existing comment #${botComment.id} on PR #${prNumber}`);
            } else {
              await github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: commentBody
              });
              console.log(`Posted new comment to PR #${prNumber}`);
            }
