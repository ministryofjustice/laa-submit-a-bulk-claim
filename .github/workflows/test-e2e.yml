name: Test using E2E dispatch

on:
  #pull_request:
  workflow_call:
    inputs:
      sabc_image_tag:
        required: true
        type: string
      test_annotation:
        required: true
        type: string

permissions:
  contents: read

jobs:

  dispatch-and-wait:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch target workflow
        id: dispatch
        env:
          GH_TOKEN: ${{ secrets.E2E_PAT_TOKEN }}
          TARGET_REPO: ministryofjustice/bulk-submission-and-fee-scheme-tests-
          TARGET_WORKFLOW_FILE: test-compose.yml
          TARGET_REF: feature/test-compose # Remove later
          SABC_IMAGE_TAG: ${{ inputs.sabc_image_tag }}
          TEST_ANNOTATION: ${{ inputs.test_annotation }}
        run: |
          set -euo pipefail

          # Record time BEFORE dispatching. This will be used to find the workflow run
          DISPATCH_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "dispatch_time=${DISPATCH_TIME}" >> "$GITHUB_OUTPUT"

          #-f inputs[sabc_image_tag]="${SABC_IMAGE_TAG}"
          echo "Dispatching E2E in ${TARGET_REPO}"
          gh api -X POST "repos/ministryofjustice/bulk-submission-and-fee-scheme-tests-/actions/workflows/test-compose.yml/dispatches" \
            -f ref="${TARGET_REF}" \
            -f inputs[test_annotation]="${TEST_ANNOTATION}" \
            -f inputs[sabc_image_tag]="submit-a-bulk-claim-1.0.146-SNAPSHOT-493fb47"

          echo "Dispatched at ${DISPATCH_TIME}"

      - name: Find the created workflow run
        id: find_run
        env:
          GH_TOKEN: ${{ secrets.E2E_PAT_TOKEN }}
          TARGET_REPO: ministryofjustice/bulk-submission-and-fee-scheme-tests-
          TARGET_WORKFLOW_FILE: test-compose.yml
          TARGET_REF: feature/test-compose
        run: |
          set -euo pipefail

          WORKFLOW_ID="$(gh api "repos/${TARGET_REPO}/actions/workflows/${TARGET_WORKFLOW_FILE}" --jq '.id')"

          # Use the time recorded just before dispatch
          DISPATCH_TIME="${{ steps.dispatch.outputs.dispatch_time }}"

          echo "Looking for run created after ${DISPATCH_TIME}"
          for i in {1..30}; do
            RUN_ID="$(gh api \
              "repos/${TARGET_REPO}/actions/workflows/${WORKFLOW_ID}/runs?branch=${TARGET_REF}&event=workflow_dispatch&per_page=10&created=>=${DISPATCH_TIME}" \
              --jq '[.workflow_runs[] | select(.status == "queued" or .status == "in_progress" or .status == "completed")] | sort_by(.created_at) | last | .id // empty')"

            if [ -n "${RUN_ID:-}" ]; then
              echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"
              echo "Found run ${RUN_ID}"
              exit 0
            fi

            sleep 5
          done

          echo "Timed out waiting for workflow run to appear"
          exit 1

      - name: Poll until completion
        env:
          # Change this for APP token
          GH_TOKEN: ${{ secrets.E2E_PAT_TOKEN }}
          TARGET_REPO: ministryofjustice/bulk-submission-and-fee-scheme-tests-
          RUN_ID: ${{ steps.find_run.outputs.run_id }}
        run: |
          set -euo pipefail

          # Should't need 1 hour, however some tests can take a long time
          for i in {1..120}; do
            STATUS="$(gh api "repos/${TARGET_REPO}/actions/runs/${RUN_ID}" --jq '.status')"
            CONCLUSION="$(gh api "repos/${TARGET_REPO}/actions/runs/${RUN_ID}" --jq '.conclusion // empty')"
            URL="$(gh api "repos/${TARGET_REPO}/actions/runs/${RUN_ID}" --jq '.html_url')"

            echo "status=${STATUS}, conclusion=${CONCLUSION:-none}"
            echo "run_url=${URL}"

            if [ "${STATUS}" = "completed" ]; then
              if [ "${CONCLUSION}" = "success" ]; then
                echo "Remote workflow succeeded"
                exit 0
              fi

              echo "Remote workflow failed: ${CONCLUSION:-unknown}"
              exit 1
            fi

            sleep 20
          done

          echo "Timed out waiting for remote workflow to complete"
          exit 1