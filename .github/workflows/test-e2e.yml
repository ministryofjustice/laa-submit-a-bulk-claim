name: Test using E2E dispatch

on:
  workflow_call:
    inputs:
      sabc_image_tag:
        required: true
        type: string
      test_annotation:
        required: true
        type: string
    secrets:
      gh_token:
        required: true

permissions:
  contents: read

jobs:

  dispatch-and-wait:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch target workflow
        id: dispatch
        env:
          GH_TOKEN: ${{ secrets.gh_token || secrets.E2E_PAT_TOKEN }}
          TARGET_REPO: ministryofjustice/bulk-submission-and-fee-scheme-tests-
          TARGET_WORKFLOW_FILE: test-compose.yml
          TARGET_REF: feature/test-compose # Remove later
          SABC_IMAGE_TAG: ${{ inputs.sabc_image_tag }}
          TEST_ANNOTATION: ${{ inputs.test_annotation }}
        run: |
          set -euo pipefail

          # Record time BEFORE dispatching. This will be used to find the workflow run
          DISPATCH_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "dispatch_time=${DISPATCH_TIME}" >> "$GITHUB_OUTPUT"

            #-f inputs[sabc_image_tag]="submit-a-bulk-claim-1.0.146-SNAPSHOT-493fb47"
          echo "Dispatching E2E in ${TARGET_REPO}"
          gh api -X POST "repos/ministryofjustice/bulk-submission-and-fee-scheme-tests-/actions/workflows/test-compose.yml/dispatches" \
            -f ref="${TARGET_REF}" \
            -f inputs[test_annotation]="${TEST_ANNOTATION}" \
            -f inputs[sabc_image_tag]="${SABC_IMAGE_TAG}"

          echo "Dispatched at ${DISPATCH_TIME}"

      - name: Debug - Inspect workflow runs structure
        id: debug_runs
        env:
          GH_TOKEN: ${{ secrets.gh_token || secrets.E2E_PAT_TOKEN }}
          TARGET_REPO: ministryofjustice/bulk-submission-and-fee-scheme-tests-
          TARGET_WORKFLOW_FILE: test-compose.yml
          TARGET_REF: feature/test-compose
          SABC_IMAGE_TAG: ${{ inputs.sabc_image_tag }}
          TEST_ANNOTATION: ${{ inputs.test_annotation }}
        run: |
          set -euo pipefail

          WORKFLOW_ID="$(gh api "repos/${TARGET_REPO}/actions/workflows/${TARGET_WORKFLOW_FILE}" --jq '.id')"
          echo "Workflow ID: ${WORKFLOW_ID}"

          # Get raw runs data
          echo "=== Raw workflow runs (first 3) ==="
          gh api "repos/${TARGET_REPO}/actions/workflows/${WORKFLOW_ID}/runs?branch=${TARGET_REF}&event=workflow_dispatch&per_page=3" \
            --jq '.workflow_runs[0:3]'

          # Check what inputs look like on a single run
          echo ""
          echo "=== First run's inputs structure ==="
          gh api "repos/${TARGET_REPO}/actions/workflows/${WORKFLOW_ID}/runs?branch=${TARGET_REF}&event=workflow_dispatch&per_page=1" \
            --jq '.workflow_runs[0] | {id, name, status, inputs}'

          echo ""
          echo "Looking for: test_annotation=${TEST_ANNOTATION}, sabc_image_tag=${SABC_IMAGE_TAG}"

      - name: Find the created workflow run
        id: find_run
        env:
          GH_TOKEN: ${{ secrets.gh_token || secrets.E2E_PAT_TOKEN }}
          TARGET_REPO: ministryofjustice/bulk-submission-and-fee-scheme-tests-
          TARGET_WORKFLOW_FILE: test-compose.yml
          TARGET_REF: feature/test-compose
          SABC_IMAGE_TAG: ${{ inputs.sabc_image_tag }}
          TEST_ANNOTATION: ${{ inputs.test_annotation }}
          DISPATCH_TIME: ${{ steps.dispatch.outputs.dispatch_time }}
        run: |
          set -euo pipefail

          WORKFLOW_ID="$(gh api "repos/${TARGET_REPO}/actions/workflows/${TARGET_WORKFLOW_FILE}" --jq '.id')"

          echo "Looking for run created after ${DISPATCH_TIME}"
          echo "Matching: test_annotation=${TEST_ANNOTATION}, sabc_image_tag=${SABC_IMAGE_TAG}"
          
          for i in {1..30}; do
            # Get recent runs
            RUN_IDS="$(gh api \
              "repos/${TARGET_REPO}/actions/workflows/${WORKFLOW_ID}/runs?branch=${TARGET_REF}&event=workflow_dispatch&per_page=10&created>=${DISPATCH_TIME}" \
              --jq '.workflow_runs[].id')"

            # Check each run's inputs individually
            while IFS= read -r RUN_ID; do
              [ -z "${RUN_ID}" ] && continue
              
              echo "Checking run ${RUN_ID}..."
              RUN_DATA="$(gh api "repos/${TARGET_REPO}/actions/runs/${RUN_ID}")"
              
              FOUND_ANNOTATION="$(echo "${RUN_DATA}" | jq -r '.inputs.test_annotation // empty')"
              FOUND_TAG="$(echo "${RUN_DATA}" | jq -r '.inputs.sabc_image_tag // empty')"
              
              echo "  test_annotation=${FOUND_ANNOTATION}, sabc_image_tag=${FOUND_TAG}"
              
              if [ "${FOUND_ANNOTATION}" = "${TEST_ANNOTATION}" ] && [ "${FOUND_TAG}" = "${SABC_IMAGE_TAG}" ]; then
                echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"
                echo "✓ Found matching run ${RUN_ID}"
                exit 0
              fi
            done <<< "${RUN_IDS}"

            echo "No match found yet, retrying in 5s..."
            sleep 5
          done

          echo "Timed out waiting for workflow run to appear"
          exit 1

      - name: Poll until completion
        env:
          # Change this for APP token
          GH_TOKEN: ${{ secrets.gh_token || secrets.E2E_PAT_TOKEN }}
          TARGET_REPO: ministryofjustice/bulk-submission-and-fee-scheme-tests-
          RUN_ID: ${{ steps.find_run.outputs.run_id }}
        run: |
          set -euo pipefail

          # Should't need 1 hour, however some tests can take a long time
          for i in {1..120}; do
            STATUS="$(gh api "repos/${TARGET_REPO}/actions/runs/${RUN_ID}" --jq '.status')"
            CONCLUSION="$(gh api "repos/${TARGET_REPO}/actions/runs/${RUN_ID}" --jq '.conclusion // empty')"
            URL="$(gh api "repos/${TARGET_REPO}/actions/runs/${RUN_ID}" --jq '.html_url')"

            echo "status=${STATUS}, conclusion=${CONCLUSION:-none}"
            echo "run_url=${URL}"

            if [ "${STATUS}" = "completed" ]; then
              if [ "${CONCLUSION}" = "success" ]; then
                echo "Remote workflow succeeded"
                exit 0
              fi

              echo "Remote workflow failed: ${CONCLUSION:-unknown}"
              exit 1
            fi

            sleep 20
          done

          echo "Timed out waiting for remote workflow to complete"
          exit 1