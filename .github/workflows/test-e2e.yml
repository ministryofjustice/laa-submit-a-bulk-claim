name: Test using E2E dispatch

on:
  workflow_call:
    inputs:
      sabc_image_tag:
        required: true
        type: string
      test_annotation:
        required: true
        type: string
    secrets:
      gh_token:
        required: true

permissions:
  contents: read

jobs:

  dispatch-and-wait:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch target workflow
        id: dispatch
        env:
          GH_TOKEN: ${{ secrets.gh_token || secrets.E2E_PAT_TOKEN }}
          TARGET_REPO: ministryofjustice/bulk-submission-and-fee-scheme-tests-
          TARGET_WORKFLOW_FILE: test-compose.yml
          TARGET_REF: feature/test-compose # Remove later
          SABC_IMAGE_TAG: ${{ inputs.sabc_image_tag }}
          TEST_ANNOTATION: ${{ inputs.test_annotation }}
        run: |
          set -euo pipefail

          echo "Dispatching E2E in ${TARGET_REPO}"
          gh api -X POST "repos/ministryofjustice/bulk-submission-and-fee-scheme-tests-/actions/workflows/test-compose.yml/dispatches" \
            -f ref="${TARGET_REF}" \
            -f inputs[test_annotation]="${TEST_ANNOTATION}" \
            -f inputs[sabc_image_tag]="${SABC_IMAGE_TAG}"

          # Record time AFTER dispatching
          DISPATCH_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "dispatch_time=${DISPATCH_TIME}" >> "$GITHUB_OUTPUT"
          echo "Dispatched at ${DISPATCH_TIME}"

      - name: Find the created workflow run
        id: find_run
        env:
          GH_TOKEN: ${{ secrets.gh_token || secrets.E2E_PAT_TOKEN }}
          TARGET_REPO: ministryofjustice/bulk-submission-and-fee-scheme-tests-
          TARGET_WORKFLOW_FILE: test-compose.yml
          TARGET_REF: feature/test-compose
          DISPATCH_TIME: ${{ steps.dispatch.outputs.dispatch_time }}
          SABC_IMAGE_TAG: ${{ inputs.sabc_image_tag }}
          TEST_ANNOTATION: ${{ inputs.test_annotation }}
        run: |
          set -euo pipefail

          WORKFLOW_ID="$(gh api "repos/${TARGET_REPO}/actions/workflows/${TARGET_WORKFLOW_FILE}" --jq '.id')"

          echo "Looking for run created after ${DISPATCH_TIME} with sabc_image_tag=${SABC_IMAGE_TAG}, test_annotation=${TEST_ANNOTATION}"

          for i in {1..30}; do
            CANDIDATES="$(gh api \
              "repos/${TARGET_REPO}/actions/workflows/${WORKFLOW_ID}/runs?branch=${TARGET_REF}&event=workflow_dispatch&per_page=10" \
              --jq "[.workflow_runs[] | select(.created_at >= \"${DISPATCH_TIME}\") | .id]")"

            echo "=== Attempt $i: Candidate run IDs ==="
            echo "${CANDIDATES}"

            RUN_ID=""
            for CANDIDATE_ID in $(echo "${CANDIDATES}" | jq -r '.[]'); do
              echo "Checking run ${CANDIDATE_ID}..."
              RUN_INPUTS="$(gh api "repos/${TARGET_REPO}/actions/runs/${CANDIDATE_ID}" --jq '.inputs')"
              echo "Inputs: ${RUN_INPUTS}"

              MATCH="$(echo "${RUN_INPUTS}" | jq -r --arg tag "${SABC_IMAGE_TAG}" --arg annotation "${TEST_ANNOTATION}" '
                if .sabc_image_tag == $tag and .test_annotation == $annotation then "yes" else "no" end')"

              if [ "${MATCH}" = "yes" ]; then
                RUN_ID="${CANDIDATE_ID}"
                break
              fi
            done

            if [ -n "${RUN_ID}" ]; then
              echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"
              echo "✓ Found run ${RUN_ID} matching inputs"
              exit 0
            fi

            echo "Matching run not found yet (attempt $i/30), retrying..."
            sleep 5
          done

          echo "Timed out waiting for workflow run to appear"
          exit 1

      - name: Debug - Check found run details
        env:
          GH_TOKEN: ${{ secrets.gh_token || secrets.E2E_PAT_TOKEN }}
          TARGET_REPO: ministryofjustice/bulk-submission-and-fee-scheme-tests-
          RUN_ID: ${{ steps.find_run.outputs.run_id }}
          DISPATCH_TIME: ${{ steps.dispatch.outputs.dispatch_time }}
        run: |
          set -euo pipefail

          echo "=== Run Details ==="
          gh api "repos/${TARGET_REPO}/actions/runs/${RUN_ID}" \
            --jq '{id, name, run_number, created_at, status, conclusion}'

          echo ""
          echo "Dispatch time was: ${DISPATCH_TIME}"
          
          echo ""
          echo "=== All recent runs on this branch/workflow ==="
          gh api "repos/${TARGET_REPO}/actions/workflows/test-compose.yml/runs?branch=feature/test-compose&event=workflow_dispatch&per_page=5" \
            --jq '.workflow_runs[] | {id, run_number, created_at, status}'

      - name: Poll until completion
        env:
          # Change this for APP token
          GH_TOKEN: ${{ secrets.gh_token || secrets.E2E_PAT_TOKEN }}
          TARGET_REPO: ministryofjustice/bulk-submission-and-fee-scheme-tests-
          RUN_ID: ${{ steps.find_run.outputs.run_id }}
        run: |
          set -euo pipefail

          # Should't need 1 hour, however some tests can take a long time
          for i in {1..120}; do
            STATUS="$(gh api "repos/${TARGET_REPO}/actions/runs/${RUN_ID}" --jq '.status')"
            CONCLUSION="$(gh api "repos/${TARGET_REPO}/actions/runs/${RUN_ID}" --jq '.conclusion // empty')"
            URL="$(gh api "repos/${TARGET_REPO}/actions/runs/${RUN_ID}" --jq '.html_url')"

            echo "status=${STATUS}, conclusion=${CONCLUSION:-none}"
            echo "run_url=${URL}"

            if [ "${STATUS}" = "completed" ]; then
              if [ "${CONCLUSION}" = "success" ]; then
                echo "Remote workflow succeeded"
                exit 0
              fi

              echo "Remote workflow failed: ${CONCLUSION:-unknown}"
              exit 1
            fi

            sleep 20
          done

          echo "Timed out waiting for remote workflow to complete"
          exit 1