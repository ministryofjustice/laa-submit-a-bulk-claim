name: Build OIDC mock image

on:
  workflow_call:
    secrets:
      LAA_SUBMIT_A_BULK_CLAIM_ECR_ROLE_TO_ASSUME:
        required: true
      gh_token:
        required: true
      github_app_id:
        required: true
      github_app_private_key:
        required: true
      github_app_organisation:
        required: true
    outputs:
      oidc_mock_tag:
        description: "OIDC mock image tag pushed to ECR"
        value: ${{ jobs.build.outputs.oidc_mock_tag }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      packages: read
    outputs:
      oidc_mock_tag: ${{ steps.build.outputs.oidc_mock_tag }}
    env:
      GITHUB_TOKEN: ${{ secrets.gh_token }}

    steps:
      - name: Get app token
        id: get_workflow_token
        uses: peter-murray/workflow-application-token-action@d17e3a9a36850ea89f35db16c1067dd2b68ee343 # v4.0.1
        with:
          application_id: ${{ secrets.github_app_id }}
          application_private_key: ${{ secrets.github_app_private_key }}
          organization: ${{ secrets.github_app_organisation }}

      - name: Checkout OIDC mock repo
        uses: actions/checkout@v6
        with:
          repository: ministryofjustice/laa-oidc-mock-server
          token: ${{ steps.get_workflow_token.outputs.token || env.GITHUB_TOKEN }}
      
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Gradle assemble
        run: ./gradlew assemble

      - name: Configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.LAA_SUBMIT_A_BULK_CLAIM_ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.LAA_SUBMIT_A_BULK_CLAIM_ECR_REGION }}

      - name: Login ecr
        uses: aws-actions/amazon-ecr-login@v2
        id: login-ecr

      - name: Build and push OIDC mock image
        id: build
        run: |
          set -euo pipefail
          image_tag="oidc-mock-${GITHUB_SHA}"
          image="${{ steps.login-ecr.outputs.registry }}/${{ vars.LAA_SUBMIT_A_BULK_CLAIM_ECR_REPOSITORY }}:${image_tag}"
          echo "Building image: $image"
          docker build -f Dockerfile -t "$image" .
          echo "Pushing image..."
          docker push "$image"
          echo "Pushed to ECR: $image"
          echo "oidc_mock_tag=$image_tag" >> "$GITHUB_OUTPUT"