name: Frontend dependency pipeline
on:
  workflow_dispatch:
  pull_request:

jobs:
  frontend-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get npm version
        id: npm
        run: echo "version=$(npm view govuk-frontend version)" >> $GITHUB_OUTPUT

      - name: Get current version
        id: current
        run: |
          VERSION=$(grep -oP "govuk-frontend:\K[0-9.]+" laa-submit-a-bulk-claim-ui/build.gradle)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if update needed
        id: compare
        run: |
          if [ "${{ steps.npm.outputs.version }}" != "${{ steps.current.outputs.version }}" ]; then
            echo "update_needed=true" >> $GITHUB_OUTPUT
          else
          echo "update_needed=false" >> $GITHUB_OUTPUT
          fi
        

