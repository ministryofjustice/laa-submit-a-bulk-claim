name: Frontend dependency pipeline
on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  frontend-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get latest NPM versions
        id: npm
        run: |
          GOVUK=$(npm view govuk-frontend version)
          MOJ=$(npm view @ministryofjustice/frontend version)
          
          echo "govuk=$GOVUK" >> $GITHUB_OUTPUT
          echo "moj=$MOJ" >> $GITHUB_OUTPUT
          
          echo "npm GOV.UK: $GOVUK"
          echo "npm MOJ: $MOJ"

      - name: Get latest WebJar version from Maven
        id: webjar
        run: |
          GOVUK=$(curl -s https://repo1.maven.org/maven2/org/webjars/npm/govuk-frontend/maven-metadata.xml \
            | sed -n 's:.*<release>\(.*\)</release>.*:\1:p')
          MOJ=$(curl -s https://repo1.maven.org/maven2/org/webjars/npm/@ministryofjustice__frontend/maven-metadata.xml \
            | sed -n 's:.*<release>\(.*\)</release>.*:\1:p')
          
          echo "govuk=$GOVUK" >> $GITHUB_OUTPUT
          echo "moj=$MOJ" >> $GITHUB_OUTPUT
          
          echo "WebJar GOV.UK: $GOVUK"
          echo "WebJar MOJ: $MOJ"

      - name: Get current version
        id: current
        run: |
          GOVUK=$(grep -oP "govuk-frontend:\K[0-9.]+" laa-submit-a-bulk-claim-ui/build.gradle)
          MOJ=$(grep -oP "ministryofjustice__frontend:\K[0-9.]+" laa-submit-a-bulk-claim-ui/build.gradle)
          
          echo "govuk=$GOVUK" >> $GITHUB_OUTPUT
          echo "moj=$MOJ" >> $GITHUB_OUTPUT
          
          echo "Current GOV.UK: $GOVUK"
          echo "Current MOJ: $MOJ"

      - name: Compare versions
        id: compare
        env:
          GOVUK_NPM: ${{ steps.npm.outputs.govuk }}
          GOVUK_WEBJAR: ${{ steps.webjar.outputs.govuk }}
          GOVUK_CURRENT: ${{ steps.current.outputs.govuk }}
          MOJ_NPM: ${{ steps.npm.outputs.moj }}
          MOJ_WEBJAR: ${{ steps.webjar.outputs.moj }}
          MOJ_CURRENT: ${{ steps.current.outputs.moj }}
        run: |
          echo "GOVUK_NPM=$GOVUK_NPM"
          echo "GOVUK_WEBJAR=$GOVUK_WEBJAR"
          echo "GOVUK_CURRENT=$GOVUK_CURRENT"
          echo "MOJ_NPM=$MOJ_NPM"
          echo "MOJ_WEBJAR=$MOJ_WEBJAR"
          echo "MOJ_CURRENT=$MOJ_CURRENT"
          
          if [ "$GOVUK_NPM" != "$GOVUK_WEBJAR" ]; then
            echo "govuk_trigger=true" >> $GITHUB_OUTPUT
          else
            echo "govuk_trigger=false" >>$GITHUB_OUTPUT
          fi
          
          if [ "$MOJ_NPM" != "$MOJ_WEBJAR" ]; then
            echo "moj_trigger=true" >> $GITHUB_OUTPUT
          else
            echo "moj_trigger=false" >>$GITHUB_OUTPUT
          fi  
          
          if [ "$GOVUK_WEBJAR" != "$GOVUK_CURRENT" ]; then
            echo "govuk_update=true" >> $GITHUB_OUTPUT
          else
            echo "govuk_update=false" >>$GITHUB_OUTPUT
          fi  
          
          if [ "$MOJ_WEBJAR" != "$MOJ_CURRENT" ]; then
            echo "moj_update=true" >> $GITHUB_OUTPUT
          else
            echo "moj_update=false" >>$GITHUB_OUTPUT
          fi  
          
          if [ "$GOVUK_WEBJAR" != "$GOVUK_CURRENT" ] || [ "$MOJ_WEBJAR" != "$MOJ_CURRENT" ]; then
            echo "update_needed=true" >> $GITHUB_OUTPUT
          else
            echo "update_needed=false" >>$GITHUB_OUTPUT
          fi  

      - name: Trigger WebJar (GOV.UK)
        if: steps.compare.outputs.govuk_trigger == 'true'
        run: |
          echo "Triggering GOV.UK WebJar."
          curl -L "https://www.webjars.org/deploy?webJarType=npm&nameOrUrlIsh=govuk-frontend&version=${{ steps.npm.outputs.govuk }}"

      - name: Trigger WebJar (MOJ)
        if: steps.compare.outputs.moj_trigger == 'true'
        run: |
          echo "Triggering GOV.UK WebJar."
          curl -L "https://www.webjars.org/deploy?webJarType=npm&nameOrUrlIsh=@ministryofjustice/frontend&version=${{ steps.npm.outputs.moj }}"

      - name: Wait for WebJar
        if: steps.compare.outputs.govuk_trigger == 'true' || steps.compare.outputs.moj_trigger == 'true'
        run: sleep 300

      - name: Update dependencies
        if: steps.compare.outputs.update_needed == 'true'
        run: |
          sed -i "s/govuk-frontend:${{ steps.current.outputs.govuk }}/govuk-frontend:&{{ steps.webjar.outputs.govuk }}/g" laa-submit-a-bulk-claim-ui/build.gradle
          sed -i "s/ministryofjustice__frontend:${{ steps.current.outputs.moj }}/ministryofjustice__frontend:&{{ steps.webjar.outputs.moj }}/g" laa-submit-a-bulk-claim-ui/build.gradle

      - name: Create pull request
        if: steps.compare.outputs.update_needed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Update frontend dependencies"
          title: "Update frontend dependencies"
          body: "Automated update via pipeline"
          branch: frontend-update-${{ steps.webjar.outputs.govuk }}-${{ steps.webjar.outputs.moj }}
          base: main


      - name: No updates needed
        if: steps.compare.outputs.update_needed == 'false'
        run: echo "All frontend dependencies are up-to-date."

