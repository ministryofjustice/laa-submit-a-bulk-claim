name: E2E Compose (deep)

on:
  workflow_call:
    inputs:
      cucumber_tags:
        required: false
        default: "@smoke"
        type: string
      sabc_image_tag:
        required: false
        default: ""
        type: string
      claims_api_image_tag:
        required: false
        default: ""
        type: string
      claims_events_image_tag:
        required: false
        default: ""
        type: string
  workflow_dispatch:
    inputs:
      cucumber_tags:
        description: "Cucumber tags to run"
        required: false
        default: "@smoke"
        type: string
      sabc_image_tag:
        description: "SaBC image tag"
        required: false
        default: ""
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  get-app-versions:
    runs-on: ubuntu-latest
    outputs:
      sabc_image_tag: ${{ inputs.sabc_image_tag || steps.sabc.outputs.image_tag }}
      claims_events_image_tag: ${{ inputs.claims_events_image_tag || steps.claims_events.outputs.image_tag }}
      claims_api_image_tag: ${{ inputs.claims_api_image_tag || steps.claims_api.outputs.image_tag }}
      fsp_api_image_tag: ${{ steps.fsp_api.outputs.image_tag }}
    environment: uat
    permissions:
      id-token: write
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.29.4

      - name: Authenticate to the SaBC EKS cluster
        uses: ministryofjustice/laa-reusable-github-actions/.github/actions/authenticate_to_cluster@768f673017edbb793cf052fa159c272d6c1f9177
        with:
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          kube-sa: deploy-user

      - name: Collect SaBC version
        id: sabc
        uses: ./.github/actions/collect-deployment-version
        with:
          deployment: uat-submit-a-bulk-claim
          namespace: ${{ secrets.KUBE_NAMESPACE_LAA_SUBMIT_A_BULK_CLAIM_UAT }}
          friendly_name: Submit a Bulk Claim

      - name: Authenticate to the Claims API EKS cluster
        uses: ministryofjustice/laa-reusable-github-actions/.github/actions/authenticate_to_cluster@768f673017edbb793cf052fa159c272d6c1f9177
        with:
          kube-cert: ${{ secrets.KUBE_CERT_LAA_DATA_CLAIMS_API_UAT }}
          kube-token: ${{ secrets.KUBE_TOKEN_LAA_DATA_CLAIMS_API_UAT }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER_LAA_DATA_CLAIMS_API_UAT }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE_LAA_DATA_CLAIMS_API_UAT }}
          kube-sa: deploy-user

      - name: Collect Claims API version
        id: claims_api
        uses: ./.github/actions/collect-deployment-version
        with:
          deployment: main-data-claims-api
          namespace: ${{ secrets.KUBE_NAMESPACE_LAA_DATA_CLAIMS_API_UAT }}
          friendly_name: Data Claims API

      - name: Authenticate to the FSP API EKS cluster
        uses: ministryofjustice/laa-reusable-github-actions/.github/actions/authenticate_to_cluster@768f673017edbb793cf052fa159c272d6c1f9177
        with:
          kube-cert: ${{ secrets.KUBE_CERT_LAA_FEE_SCHEME_API_UAT }}
          kube-token: ${{ secrets.KUBE_TOKEN_LAA_FEE_SCHEME_API_UAT }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER_LAA_FEE_SCHEME_API_UAT }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE_LAA_FEE_SCHEME_API_UAT }}
          kube-sa: deploy-user

      - name: Collect FSP API version
        id: fsp_api
        uses: ./.github/actions/collect-deployment-version
        with:
          deployment: laa-fee-scheme-api-uat-deployment
          namespace: ${{ secrets.KUBE_NAMESPACE_LAA_FEE_SCHEME_API_UAT }}
          friendly_name: FSP API


      - name: Authenticate to the Claims Event Service EKS cluster
        uses: ministryofjustice/laa-reusable-github-actions/.github/actions/authenticate_to_cluster@768f673017edbb793cf052fa159c272d6c1f9177
        with:
          kube-cert: ${{ secrets.KUBE_CERT_LAA_DATA_CLAIMS_EVENT_SERVICE_UAT }}
          kube-token: ${{ secrets.KUBE_TOKEN_LAA_DATA_CLAIMS_EVENT_SERVICE_UAT }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER_LAA_DATA_CLAIMS_EVENT_SERVICE_UAT }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE_LAA_DATA_CLAIMS_EVENT_SERVICE_UAT }}
          kube-sa: deploy-user

      - name: Collect Claims Event Service version
        id: claims_events
        uses: ./.github/actions/collect-deployment-version
        with:
          deployment: uat-data-claims-events
          namespace: ${{ secrets.KUBE_NAMESPACE_LAA_DATA_CLAIMS_EVENT_SERVICE_UAT }}
          friendly_name: Data Claims Events


      - name: Publish test image versions summary
        env:
          SABC_IMAGE_TAG: ${{ inputs.sabc_image_tag }}
          CLAIMS_API_IMAGE_TAG_OVERRIDE: ${{ inputs.claims_api_image_tag }}
          CLAIMS_EVENT_IMAGE_TAG_OVERRIDE: ${{ inputs.claims_events_image_tag }}

          SABC_TAG: ${{ steps.sabc.outputs.image_tag }}
          SABC_CONTEXT: ${{ steps.sabc.outputs.context }}
          SABC_RELEASE_TIME: ${{ steps.sabc.outputs.release_time }}
          SABC_STATUS: ${{ steps.sabc.outputs.status }}

          CLAIMS_API_TAG: ${{ steps.claims_api.outputs.image_tag }}
          CLAIMS_API_CONTEXT: ${{ steps.claims_api.outputs.context }}
          CLAIMS_API_RELEASE_TIME: ${{ steps.claims_api.outputs.release_time }}
          CLAIMS_API_STATUS: ${{ steps.claims_api.outputs.status }}

          CLAIMS_EVENTS_TAG: ${{ steps.claims_events.outputs.image_tag }}
          CLAIMS_EVENTS_CONTEXT: ${{ steps.claims_events.outputs.context }}
          CLAIMS_EVENTS_RELEASE_TIME: ${{ steps.claims_events.outputs.release_time }}
          CLAIMS_EVENTS_STATUS: ${{ steps.claims_events.outputs.status }}

          FSP_API_TAG: ${{ steps.fsp_api.outputs.image_tag }}
          FSP_API_CONTEXT: ${{ steps.fsp_api.outputs.context }}
          FSP_API_RELEASE_TIME: ${{ steps.fsp_api.outputs.release_time }}
          FSP_API_STATUS: ${{ steps.fsp_api.outputs.status }}

        run: |
          set -euo pipefail
          {
            echo "## Versions testing against deployment versions"
            echo ""
            echo "| Service | Context | Image tag | Release time | Status |"
            echo "| --- | --- | --- | --- | --- |"

            SABC_OVERRIDE=""
            if [ -n "${SABC_IMAGE_TAG:-}" ]; then
              SABC_OVERRIDE=" (overridden: ${SABC_IMAGE_TAG})"
            fi
            echo "| Submit a Bulk Claim | ${SABC_CONTEXT} | ${SABC_TAG}${SABC_OVERRIDE} | ${SABC_RELEASE_TIME} | ${SABC_STATUS} |"

            EVENTS_OVERRIDE=""
            if [ -n "${CLAIMS_EVENT_IMAGE_TAG_OVERRIDE:-}" ]; then
              EVENTS_OVERRIDE=" (overridden: ${CLAIMS_EVENT_IMAGE_TAG_OVERRIDE})"
            fi
            echo "| Data Claims Events | ${CLAIMS_EVENTS_CONTEXT} | ${CLAIMS_EVENTS_TAG}${EVENTS_OVERRIDE} | ${CLAIMS_EVENTS_RELEASE_TIME} | ${CLAIMS_EVENTS_STATUS} |"

            API_OVERRIDE=""
            if [ -n "${CLAIMS_API_IMAGE_TAG_OVERRIDE:-}" ]; then
              API_OVERRIDE=" (overridden: ${CLAIMS_API_IMAGE_TAG_OVERRIDE})"
            fi
            echo "| Data Claims API | ${CLAIMS_API_CONTEXT} | ${CLAIMS_API_TAG}${API_OVERRIDE} | ${CLAIMS_API_RELEASE_TIME} | ${CLAIMS_API_STATUS} |"

            echo "| FSP API | ${FSP_API_CONTEXT} | ${FSP_API_TAG} | ${FSP_API_RELEASE_TIME} | ${FSP_API_STATUS} |"
          } >> "$GITHUB_STEP_SUMMARY"

  run-compose-e2e:
    needs:
      - get-app-versions
    runs-on: ubuntu-22.04
    environment: uat
    env:
      PLAYWRIGHT_BROWSERS_PATH: /home/runner/.cache/ms-playwright
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Install kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5
        with:
          version: v1.29.4

      - name: Authenticate to FSP cluster
        uses: ministryofjustice/laa-reusable-github-actions/.github/actions/authenticate_to_cluster@7666443ea3f635ec52544311e0f0ea51830468c0
        with:
          kube-cert: ${{ secrets.KUBE_CERT_LAA_FEE_SCHEME_API_UAT }}
          kube-token: ${{ secrets.KUBE_TOKEN_LAA_FEE_SCHEME_API_UAT }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER_LAA_FEE_SCHEME_API_UAT }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE_LAA_FEE_SCHEME_API_UAT }}
          kube-sa: deploy-user

      - name: Port forward to FPS-API Service
        uses: ./.github/actions/port-forward-service
        with:
          kube_namespace: ${{ secrets.KUBE_NAMESPACE_LAA_FEE_SCHEME_API_UAT }}
          service_name: 'laa-fee-scheme-api-service'
          local_port: "8095"
          remote_port: "8085"
          pid_env_var: PORT_FORWARD_PID
          wait_label: fsp-api

      - name: Print API docs of FSP-API for debugging
        run: |
          curl -s http://localhost:8095/v3/api-docs | grep -E 'paths|components'

      - name: Authenticate to SaBC cluster
        uses: ministryofjustice/laa-reusable-github-actions/.github/actions/authenticate_to_cluster@7666443ea3f635ec52544311e0f0ea51830468c0
        with:
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          kube-sa: deploy-user

      - name: Port forward to PDA-API Service SaBC Namespace
        uses: ./.github/actions/port-forward-service
        with:
          kube_namespace: ${{ secrets.KUBE_NAMESPACE }}
          service_name: 'uat-e2e-testing-pda-proxy'
          local_port: "8186"
          remote_port: "8080"
          pid_env_var: PORT_FORWARD_PID
          wait_label: pda-api

      - name: Print API docs of PDA-API for debugging
        run: |
          curl -s http://localhost:8186/v3/api-docs | grep -E 'paths|components'

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /home/runner/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-1.56.0
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Chromium dependencies
        run: npx --yes playwright@1.56.0 install-deps chromium

      - name: Install Playwright Chromium browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx --yes playwright@1.56.0 install chromium

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@fb7eb401298e393da51cdcb2feb1ed0183619014 # v6
        with:
          role-to-assume: ${{ secrets.LAA_SUBMIT_A_BULK_CLAIM_ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.LAA_SUBMIT_A_BULK_CLAIM_ECR_REGION }}

      - name: Pull OIDC image
        uses: ./.github/actions/pull-ecr-image
        with:
          role-to-assume: ${{ secrets.LAA_OIDC_MOCK_SERVER_ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.LAA_OIDC_MOCK_SERVER_ECR_REGION }}
          registry-account: ${{ secrets.ECR_ACCOUNT }}
          repository: ${{ vars.LAA_OIDC_MOCK_SERVER_ECR_REPOSITORY }}
          image-tag: oidc-mock-latest

      - name: Pull Event Service image
        uses: ./.github/actions/pull-ecr-image
        with:
          role-to-assume: ${{ secrets.LAA_DATA_CLAIMS_EVENT_SERVICE_ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.LAA_DATA_CLAIMS_EVENT_SERVICE_ECR_REGION }}
          registry-account: ${{ secrets.ECR_ACCOUNT }}
          repository: ${{ vars.LAA_DATA_CLAIMS_EVENT_SERVICE_ECR_REPOSITORY }}
          image-tag: ${{ needs.get-app-versions.outputs.claims_events_image_tag }}

      - name: Pull Claims API image
        uses: ./.github/actions/pull-ecr-image
        with:
          role-to-assume: ${{ secrets.LAA_DATA_CLAIMS_API_ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.LAA_DATA_CLAIMS_API_ECR_REGION }}
          registry-account: ${{ secrets.ECR_ACCOUNT }}
          repository: ${{ vars.LAA_DATA_CLAIMS_API_ECR_REPOSITORY }}
          image-tag: ${{ needs.get-app-versions.outputs.claims_api_image_tag }}

      - name: Pull SABC image
        uses: ./.github/actions/pull-ecr-image
        with:
          role-to-assume: ${{ secrets.LAA_SUBMIT_A_BULK_CLAIM_ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.LAA_SUBMIT_A_BULK_CLAIM_ECR_REGION }}
          registry-account: ${{ secrets.ECR_ACCOUNT }}
          repository: ${{ vars.LAA_SUBMIT_A_BULK_CLAIM_ECR_REPOSITORY }}
          image-tag: ${{ needs.get-app-versions.outputs.sabc_image_tag }}

      # This step is required to allow E2E to use http://oidc:9000, just like the containers would. This keeps
      # the host name the same, generating a valid JWT for SaBC. On the github runner, this should resolve to
      # the IP address of the 127.0.0.1 container. Otherwise, should resolve to 127.0.0.1.
      - name: Map hostnames to 127.0.0.1
        shell: bash
        run: |
          set -euo pipefail

          HOST_IP="$(getent ahostsv4 127.0.0.1 | awk 'NR==1 {print $1}')"
          echo "Resolved IPv4 127.0.0.1 to: ${HOST_IP}"

          if ! grep -qE '(^|[[:space:]])oidc([[:space:]]|$)' /etc/hosts; then
            echo "${HOST_IP} oidc" | sudo tee -a /etc/hosts >/dev/null
          else
            echo "oidc already present in /etc/hosts, skipping"
          fi

          if ! grep -qE '(^|[[:space:]])app([[:space:]]|$)' /etc/hosts; then
            echo "${HOST_IP} app" | sudo tee -a /etc/hosts >/dev/null
          else
            echo "oidc already present in /etc/hosts, skipping"
          fi

      - name: Run compose stack
        env:
          ECR_ACCOUNT: ${{ secrets.ECR_ACCOUNT }}
          LAA_SUBMIT_A_BULK_CLAIM_ECR_REGION: ${{ vars.LAA_SUBMIT_A_BULK_CLAIM_ECR_REGION }}
          LAA_SUBMIT_A_BULK_CLAIM_ECR_REPOSITORY: ${{ vars.LAA_SUBMIT_A_BULK_CLAIM_ECR_REPOSITORY }}
          LAA_DATA_CLAIMS_EVENT_SERVICE_ECR_REGION: ${{ vars.LAA_DATA_CLAIMS_EVENT_SERVICE_ECR_REGION }}
          LAA_DATA_CLAIMS_EVENT_SERVICE_ECR_REPOSITORY: ${{ vars.LAA_DATA_CLAIMS_EVENT_SERVICE_ECR_REPOSITORY }}
          LAA_DATA_CLAIMS_API_ECR_REGION: ${{ vars.LAA_DATA_CLAIMS_API_ECR_REGION }}
          LAA_DATA_CLAIMS_API_ECR_REPOSITORY: ${{ vars.LAA_DATA_CLAIMS_API_ECR_REPOSITORY }}
          LAA_OIDC_MOCK_SERVER_ECR_REGION: ${{ vars.LAA_OIDC_MOCK_SERVER_ECR_REGION }}
          LAA_OIDC_MOCK_SERVER_ECR_REPOSITORY: ${{ vars.LAA_OIDC_MOCK_SERVER_ECR_REPOSITORY }}
          AUTH_CLIENT_ID: ${{ secrets.AUTH_CLIENT_ID }}
          AUTH_CLIENT_SECRET: ${{ secrets.AUTH_CLIENT_SECRET }}
          AUTH_SCOPE: ${{ secrets.AUTH_SCOPE }}
          AUTH_TENANT_ID: ${{ secrets.AUTH_TENANT_ID }}
          SDS_API_URL: ${{ vars.SDS_API_URL }}
          FSP_API_BASE_URL: 'http://localhost:8095'
          FSP_API_TOKEN: ${{ secrets.FSP_API_TOKEN }}
          PROVIDER_API_BASE_URL: 'http://localhost:8186'
          PROVIDER_API_KEY: ${{ secrets.PDA_API_TOKEN }}
          SABC_TAG: ${{ needs.get-app-versions.outputs.sabc_image_tag }}
          CLAIMS_API_TAG: ${{ needs.get-app-versions.outputs.claims_api_image_tag }}
          EVENT_SERVICE_TAG: ${{ needs.get-app-versions.outputs.claims_events_image_tag }}
          OIDC_TAG: oidc-mock-latest
        run: |
          set -euo pipefail
          docker compose -p "e2e-${GITHUB_RUN_ID}" -f e2e-compose.yaml up sabc-ui event-service claims-api -d --wait

      - name: Wait for compose app health
        run: |
          set -euo pipefail
          for i in {1..36}; do
            if curl -fsS http://127.0.0.1:8181/actuator/health | grep -q '"status":"UP"'; then
              echo "sabc-ui healthy"
              exit 0
            fi
            sleep 5
          done
          echo "sabc-ui health check timed out"
          exit 1

      - name: Run Java E2E login + tests
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
          E2E_BASE_URL: http://127.0.0.1:8082
          E2E_AUTH_MODE: mock
          E2E_HEADLESS: true
          E2E_STORAGE_STATE_PATH: build/e2e/storageState.json
          CUCUMBER_TAGS: ${{ inputs.cucumber_tags }}
          DSTEW_API_BASE_URL: http://127.0.0.1:8080
          DSTEW_API_TOKEN: f67f968e-b479-4e61-b66e-f57984931e56
          FSP_API_BASE_URL: http://127.0.0.1:8095
          FSP_API_TOKEN: ${{ secrets.FSP_API_TOKEN }}
          PROVIDER_API_KEY: ${{ secrets.PDA_API_TOKEN }}
          MOCK_USERNAME: provider.user@provider.com
          MOCK_PASSWORD: password
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: laa_data_claims_api_dev
          DB_USER: user
          DB_PASS: dev
          DB_SSL: false
        run: |
          set -euo pipefail
          ./gradlew :laa-submit-a-bulk-claim-e2e-tests:e2eLogin --no-daemon
          ./gradlew :laa-submit-a-bulk-claim-e2e-tests:cucumberTest --no-daemon

      - name: Collect docker logs
        if: always()
        run: |
          mkdir -p logs
          docker logs app > logs/sabc.log 2>&1 || true
          docker logs data-claims-api-app > logs/claims-api.log 2>&1 || true
          docker logs data-claims-event-service-app > logs/event-service.log 2>&1 || true
          docker logs local-postgres > logs/postgres.log 2>&1 || true
          docker logs event-service-localstack > logs/localstack.log 2>&1 || true
          docker logs redis > logs/redis.log 2>&1 || true
          docker logs oidc > logs/oidc.log 2>&1 || true
          cat pf-fsp.log > logs/pf-fsp.log 2>&1 || true
          cat pf-pda.log > logs/pf-pda.log 2>&1 || true

      - name: Upload compose logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: compose-e2e-logs
          path: logs
          if-no-files-found: warn

      - name: Upload Java E2E reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: java-e2e-reports
          path: |
            laa-submit-a-bulk-claim-e2e-tests/build/allure-results
            laa-submit-a-bulk-claim-e2e-tests/build/reports
            laa-submit-a-bulk-claim-e2e-tests/build/test-results
          if-no-files-found: warn

      - name: Teardown compose + port-forwards
        if: always()
        run: |
          set +e
          docker compose -p "e2e-${GITHUB_RUN_ID}" -f e2e-compose.yaml down -v
          [ -n "${PORT_FORWARD_FSP_PID:-}" ] && kill "${PORT_FORWARD_FSP_PID}" || true
          [ -n "${PORT_FORWARD_PDA_PID:-}" ] && kill "${PORT_FORWARD_PDA_PID}" || true
          true
