name: pull-ecr-image
author: jamie.briggs
description: Pulls the latest ECR image

inputs:
  role-to-assume:
    description: AWS role to assume for ECR access
    required: true
  aws-region:
    description: AWS region of the ECR registry
    required: true
  registry-account:
    description: AWS account ID hosting the ECR registry
    required: true
  repository:
    description: ECR repository name
    required: true
  image-tag:
    description: Docker image tag to pull
    required: true

runs:
  using: composite
  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.role-to-assume }}
        aws-region: ${{ inputs.aws-region }}

    - name: Docker login to ECR
      uses: aws-actions/amazon-ecr-login@v2
      with:
        mask-password: 'true'

    - name: Pull Docker image
      shell: bash
      env:
        REGISTRY_ACCOUNT: ${{ inputs.registry-account }}
        AWS_REGION: ${{ inputs.aws-region }}
        REPOSITORY: ${{ inputs.repository }}
        IMAGE_TAG: ${{ inputs.image-tag }}
      run: |
        set -euo pipefail
        
        IMAGE_URI="${{ env.REGISTRY_ACCOUNT }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.REPOSITORY }}:${{ env.IMAGE_TAG }}"
        MAX_RETRIES=30
        RETRY_DELAY=20
      
        attempt=0
        while (( attempt < MAX_RETRIES )); do
          ((++attempt))
          echo "Attempting to pull image (attempt ${attempt}/${MAX_RETRIES}): ${IMAGE_URI}"
          
          if docker pull "$IMAGE_URI"; then
            echo "Successfully pulled image"
            exit 0
          fi
          
          if (( attempt < MAX_RETRIES )); then
            echo "Pull failed, waiting ${RETRY_DELAY} seconds before retry..." >&2
            sleep "$RETRY_DELAY"
          fi
        done
      
        echo "Failed to pull image after ${MAX_RETRIES} attempts" >&2
        exit 1