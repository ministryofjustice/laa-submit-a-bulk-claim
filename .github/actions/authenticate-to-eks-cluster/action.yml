name: "Authenticate to the EKS cluster"

inputs:
  kube_cluster:
    description: 'The EKS cluster'
    required: true
    type: string
  kube_namespace:
    description: 'The EKS namespace'
    required: true
    type: string
  kube_token:
    description: 'The EKS authentication token'
    required: true
    type: string
  kube_cert:
    description: 'The EKS TLS certificate'
    required: true
    type: string

runs:
  using: "composite"
  steps:
    - name: Authenticate to EKS cluster
      shell: bash
      run: |
        echo "${{ inputs.kube_cert }}" > ca.crt
        kubectl config set-cluster ${{ inputs.kube_cluster }} --certificate-authority=./ca.crt --server=https://${{ inputs.kube_cluster }}
        kubectl config set-credentials deploy-user --token=${{ inputs.kube_token }}
        kubectl config set-context ${{ inputs.kube_cluster }} --cluster=${{ inputs.kube_cluster }} --user=deploy-user --namespace=${{ inputs.kube_namespace }}
        kubectl config use-context ${{ inputs.kube_cluster }}