services:
  sabc-ui-oidc:
    container_name: submit-a-bulk-claim-oidc-app
    profiles:
      - application
    build:
      context: .
      dockerfile: Dockerfile_internal
      args:
        - BUILD_SOURCE=internal
      secrets:
        - github_actor
        - github_token
    environment:
      SERVER_MAX_FILE_SIZE: 50MB
      UPLOAD_MAX_FILE_SIZE: 10MB
      SILAS_CLIENT_ID: bulk-claim-client
      SILAS_CLIENT_SECRET: secret
      SILAS_SCOPE: openid, profile
      SILAS_TENANT_ID: bulk-claim-client-tenant
      AUTH_CLIENT_ID: ${AUTH_CLIENT_ID}
      AUTH_CLIENT_SECRET: ${AUTH_CLIENT_SECRET}
      AUTH_SCOPE: ${AUTH_SCOPE}
      AUTH_TENANT_ID: ${AUTH_TENANT_ID}
      SDS_API_URL: ${SDS_API_URL}
      CLAIM_API_URL: http://host.docker.internal:8080
      CLAIMS_API_ACCESS_TOKEN: f67f968e-b479-4e61-b66e-f57984931e56
      REST_CLIENT_CONNECT_TIMEOUT: ${REST_CLIENT_CONNECT_TIMEOUT:-5000}
      REST_CLIENT_READ_TIMEOUT: ${REST_CLIENT_READ_TIMEOUT:-40000}
      REDIS_HOST: redis://redis:6379
      SPRING_PROFILES_ACTIVE: oidc
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_SILAS_IDENTITY_ISSUER_URI: http://oidc:9000
      JAVA_TOOL_OPTIONS: -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
    # Information on why these ports here: https://github.com/ministryofjustice/laa-data-claims-parent#exposed-ports
    ports:
      - "8082:8082"
      - "8182:8081"
      - "5082:5005"
    depends_on:
      - redis
      - laa-mock-oidc-service

  # Follow guidance here to run this service via docker: https://github.com/ministryofjustice/laa-oidc-mock-server?tab=readme-ov-file#running-the-server-via-docker
  laa-mock-oidc-service:
    container_name: oidc
    image: laa-oidc-mock-server:latest
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9000"] # Checks if the port is open
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      LAA_ACCOUNTS: 1,123,0P322F,2Q779P,2Q286D,2Q263D,2Q271M,0E525U,2Q286D,2N199K,1T102C,2P746R,2L847Q
      REDIRECT_BASE_URI: "localhost:8082"

  redis:
    image: redis:8-alpine
    container_name: redis
    restart: always
    ports:
      - "6382:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  redis_data:
