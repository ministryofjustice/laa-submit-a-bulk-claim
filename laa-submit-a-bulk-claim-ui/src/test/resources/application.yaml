server:
  port: 8082
spring:
  profiles:
    active: test
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

app:
  canonical-base-url: "http://localhost:8080"
  sds-api:
    url: xx
  cwa-api:
    url: xx
    timeout: 1
  upload-max-file-size: 10MB
  maintenance:
    disable-at-time: ${OUTAGE_BANNER_DISABLE_AT_TIMESTAMP:2026-05-29T17:29:00Z}
    outage-banner-message: ${OUTAGE_BANNER_MESSAGE:Submit a Bulk Claim will be unavailable on Thursday 18 May between 5:00pm and 9:00pm due to planned maintenance.}


rest-client:
  connect-timeout: 5
  read-timeout: 1