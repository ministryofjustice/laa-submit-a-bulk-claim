<!DOCTYPE HTML>
<html lang="en" class="govuk-template" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{ layout/main-layout :: layout(#{nilSubmission.heading}, ~{::main},
       ~{::#back-link},'nil-submission')}">

<th:block id="back-link">
    <a th:href="@{/nil-submission/office}"
       class="govuk-back-link"
       th:text="#{common.back}"/>
</th:block>
<main class="govuk-main-wrapper" id="main-content">
    <div class="govuk-width-container">
        <div class="govuk-grid-row">
            <div class="govuk-grid-column-full" th:object="${nilSubmissionForm}">
                <div th:replace="~{fragments/error-components :: error-summary}"/>
                <div id="nil-submission-hint" class="govuk-hint" th:text="#{nilSubmission.hint}"></div>
                <h1 class="govuk-heading-l" th:text="#{nilSubmission.areaOfLaw.heading}"/>
                <th:block th:replace="~{fragments/nil-submission-summary :: nil-submission-summary}"/>
                <form class="form" th:action="@{/nil-submission/areaoflaw}" method="post">
                    <div class="govuk-form-group"
                         th:classappend="${#fields.hasErrors('areaOfLaw')} ? ' govuk-form-group--error'">
                        <fieldset class="govuk-fieldset">
                            <legend class="govuk-fieldset__legend govuk-fieldset__legend--m"
                                    th:text="#{nilSubmission.areaOfLaw.heading}">
                            </legend>
                            <th:block th:replace="~{fragments/error-components :: error-messages('areaOfLaw')}"/>
                            <div class="govuk-radios govuk-radios--small"
                                 data-module="govuk-radios" id="area-of-law-input-container">
                                <th:block th:each="areaOfLaw,idx : ${areasOfLaw}">
                                    <div class="govuk-radios__item">
                                        <input class="govuk-radios__input"
                                               th:id="${idx.index > 0} ? |area-of-law-input-${idx.index}| : |area-of-law-input|"
                                               type="radio"
                                               th:field="*{areaOfLaw}"
                                               th:value="${areaOfLaw.getKey()}"
                                               >
                                        <label class="govuk-label govuk-radios__label"
                                               th:for="${idx.index > 0} ? |area-of-law-input-${idx.index}| : |area-of-law-input|"
                                               th:text="#{__${areaOfLaw.getValue()}__}">
                                        </label>
                                    </div>
                                </th:block>

                            </div>
                        </fieldset>
                    </div>
                    <div class="govuk-button-group">
                        <button type="submit" data-prevent-double-click="true" class="govuk-button" data-module="govuk-button"
                                th:text="#{nilSubmission.primaryButton}"/>
                        <a th:href="@{/nil-submission/cancel(destination='UPLOAD')}" th:text="#{nilSubmission.cancel}"
                           class="govuk-link govuk-link--no-visited-state"></a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>
</html>
