<!DOCTYPE HTML>
<html lang="en" class="govuk-template" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{ layout/main-layout :: layout(#{nilSubmission.heading}, ~{::main},
       ~{},~{})}">
<main class="govuk-main-wrapper" id="main-content">

    <div class="govuk-grid-row">

        <!--/*@thymesVar id="fileUploadForm" type="uk.gov.justice.laa.bulkclaim.dto.FileUploadForm"*/-->
        <form class="form" th:action="@{/nil-submission-areaoflaw}" method="post">
            <h1 class="govuk-heading-xl" th:text="#{nilSubmission.areOfLaw.heading}"/>
            <div class="govuk-grid-column-full">
                <!--<details class="govuk-details" th:open="${#fields.hasErrors('offices')}">
                  <summary class="govuk-details__summary"
                           id="choose-office-account-details-summary">
                    <span class="govuk-details__summary-text"
                          th:text="#{search.result.header.chooseOffice}">
                    </span>
                  </summary> -->
                <div class="govuk-details__text">
                    <!--<div class="govuk-form-group" th:classappend="${#fields.hasErrors('offices')} ? 'govuk-form-group--error' : ''">-->
                    <fieldset class="govuk-fieldset">
                        <!--<th:block th:replace="~{fragments/error-components :: error-messages('offices')}"/>-->
                        <div class="govuk-radios govuk-radios--inline govuk-radios--small"
                             data-module="govuk-radios" id="arias-of-law-input-container">
                            <th:block th:each="areaOfLaw,idx : ${areasOfLaw}">
                                <div class="govuk-radios__item">
                                    <input class="govuk-radios__input"
                                           th:id="${idx.index > 0} ? |areas-of-law-input-${idx.index}| : |areas-of-law-input|"
                                           type="radio"
                                           name="areasOfLaw"
                                           th:value="${areaOfLaw}">
                                    <label class="govuk-label govuk-radios__label"
                                           th:for="${idx.index > 0} ? |areas-of-law-input-${idx.index}| : |areas-of-law-input|"
                                           th:text="${areaOfLaw}">
                                    </label>
                                </div>
                            </th:block>

                        </div>
                    </fieldset>
                </div>

                <div class="govuk-details__text">
                    <label class="govuk-label govuk-label--s"
                           th:text="${nilSubmissionSelection}"></label>
                </div>
            </div>
            <button type="submit" class="govuk-button" data-module="govuk-button"
                    th:text="#{nilSubmission.primaryButton}"/>
        </form>
    </div>
</main>
</html>
