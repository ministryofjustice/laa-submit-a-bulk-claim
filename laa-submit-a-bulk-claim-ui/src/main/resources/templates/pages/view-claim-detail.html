<!DOCTYPE HTML>
<html lang="en" class="govuk-template" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{ layout/main-layout :: layout(${ufn} ? #{viewClaim.heading(${ufn})} : #{viewClaim.heading.noUfn},~{::main},~{::#back-link},'search-submissions')}">


<!--/*@thymesVar id="values" type="uk.gov.justice.laa.bulkclaim.dto.submission.claim.BulkClaimCostItem"*/-->
<tr class="govuk-table__row" th:fragment="fee-detail-row(title, values, notes, isMoney)"
    th:with="rowStyle=${rowStyle?:null}">
    <th scope="row" class="govuk-table__header" th:classappend="${rowStyle} ? __${rowStyle}__ : ''"
        th:text="${title}"/>
    <td class="govuk-table__cell govuk-table__cell--numeric"
        th:classappend="${rowStyle} ? ${rowStyle} : ''">
        <th:block th:if="${values != null and values.calculatedValue != null}"
                  th:text="|£${values.calculatedValue}|"/>
        <th:block th:unless="${values != null and values.calculatedValue != null}">£0.00</th:block>
    </td>
    <td class="govuk-table__cell govuk-table__cell--numeric"
        th:classappend="${rowStyle} ? ${rowStyle} : ''">
        <th:block th:if="${values != null and values.enteredValue != null}"
                  th:text="${isMoney} ? |£${values.enteredValue}| : ${values.enteredValue.intValue()}"/>


        <th:block th:unless="${values != null and values.enteredValue != null}"
                  th:aria-label="#{viewClaim.feeCalculation.na}"
                  th:text="#{viewClaim.feeCalculation.na}"/>
    </td>
    <td class="govuk-table__cell" th:classappend="${rowStyle} ? ${rowStyle} : ''"
        th:text="${notes}"/>
</tr>

<th:block id="back-link"
          th:with="viewSubmissionUrl=@{/submission/{submissionId}(submissionId=${submissionId})}">
    <a th:href="${@thymeleafHrefUtils.build(viewSubmissionUrl, 'page', page, 'navTab', navigationTab, 'messagesPage', messagesPage)}"
       class="govuk-back-link"
       th:text="#{common.back}"/>
</th:block>

<th:block th:fragment="summary-row(title, value)">
    <div class="govuk-summary-list__row">
        <dt class="govuk-summary-list__key" th:text="${title}">
        </dt>
        <dd class="govuk-summary-list__value" th:text="${value}">
        </dd>
    </div>
</th:block>
<main class="govuk-main-wrapper" id="main-content">

    <div class="govuk-width-container">
        <div class="govuk-grid-row">

            <div class="govuk-grid-column-full" th:if="${claimStatus == 'VOID'}">
                <div role="region"
                     class="moj-alert moj-alert--error moj-alert--with-heading"
                     th:aria-label="#{viewClaim.summary.errorAlertAriaLabel(#{viewClaim.voidedBanner})}"
                     data-module="moj-alert">
                    <div>
                        <svg class="moj-alert__icon" role="presentation" focusable="false"
                             xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 30" height="30" width="30">
                            <path fill-rule="evenodd" clip-rule="evenodd"
                                  d="M20.1777 2.5H9.82233L2.5 9.82233V20.1777L9.82233 27.5H20.1777L27.5 20.1777V9.82233L20.1777 2.5ZM10.9155 8.87769L15.0001 12.9623L19.0847 8.87771L21.1224 10.9154L17.0378 15L21.1224 19.0846L19.0847 21.1222L15.0001 17.0376L10.9155 21.1223L8.87782 19.0846L12.9624 15L8.87783 10.9153L10.9155 8.87769Z"
                                  fill="currentColor"/>
                        </svg>
                    </div>
                    <div class="moj-alert__content">
                        <h2 class="moj-alert__heading" th:text="#{viewClaim.voidedBanner}">
                        </h2>
                    </div>
                    <div class="moj-alert__action">
                        <button class="moj-alert__dismiss" hidden>Dismiss</button>
                    </div>
                </div>
            </div>

            <div class="govuk-grid-column-full" data-module="laa-print-button">
                <h1 class="govuk-heading-l"
                    th:text="#{viewClaim.heading}"/>
            </div>

            <div class="govuk-grid-column-full" th:unless="${claimMessages?.messages?.isEmpty()}">
                <div th:each="warning : ${claimMessages.messages}" role="region"
                     class="moj-alert moj-alert--warning moj-alert--with-heading"
                     th:aria-label="#{viewClaim.summary.warningAlertAriaLabel(${warning.message()})}"
                     data-module="moj-alert">
                    <div>
                        <svg class="moj-alert__icon" role="presentation" focusable="false"
                             xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 30" height="30" width="30">
                            <path fill-rule="evenodd" clip-rule="evenodd"
                                  d="M15 2.44922L28.75 26.1992H1.25L15 2.44922ZM13.5107 9.49579H16.4697L16.2431 17.7678H13.7461L13.5107 9.49579ZM13.1299 21.82C13.1299 21.5661 13.1787 21.3285 13.2764 21.1071C13.374 20.8793 13.5075 20.6807 13.6768 20.5114C13.8525 20.3421 14.0544 20.2087 14.2822 20.111C14.5101 20.0134 14.7542 19.9645 15.0146 19.9645C15.2686 19.9645 15.5062 20.0134 15.7275 20.111C15.9554 20.2087 16.154 20.3421 16.3232 20.5114C16.4925 20.6807 16.626 20.8793 16.7236 21.1071C16.8213 21.3285 16.8701 21.5661 16.8701 21.82C16.8701 22.0804 16.8213 22.3246 16.7236 22.5524C16.626 22.7803 16.4925 22.9789 16.3232 23.1481C16.154 23.3174 15.9554 23.4509 15.7275 23.5485C15.5062 23.6462 15.2686 23.695 15.0146 23.695C14.7542 23.695 14.5101 23.6462 14.2822 23.5485C14.0544 23.4509 13.8525 23.3174 13.6768 23.1481C13.5075 22.9789 13.374 22.7803 13.2764 22.5524C13.1787 22.3246 13.1299 22.0804 13.1299 21.82Z"
                                  fill="currentColor"/>
                        </svg>
                    </div>
                    <div class="moj-alert__content" th:text="${warning.message()}"/>
                    <div class="moj-alert__action">
                        <button class="moj-alert__dismiss" hidden>Dismiss</button>
                    </div>
                </div>
            </div>
            <div class="govuk-grid-row">
                <div class="govuk-grid-column-full">
                    <div class="govuk-summary-card">
                        <div class="govuk-summary-card__title-wrapper">
                            <h2 class="govuk-summary-card__title" th:text=#{submission.summary.claims.subheading}></h2>
                        </div>
                        <div class="govuk-summary-card__content">
                            <dl class="govuk-summary-list">
                                <th:block th:if="${claimSummary.areaOfLaw == 'LEGAL HELP'}">
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.clientName}, ${claimSummary.clientForename + ' ' + claimSummary.clientSurname})}"></th:block>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.ufn}, ${claimSummary.uniqueFileNumber})}"></th:block>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.ucn}, ${claimSummary.uniqueClientNumber})}"></th:block>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.officeAccount}, ${claimSummary.officeAccountNumber})}"/>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.dateSubmitted}, ${#temporals.format(claimSummary.submissionDate, 'd MMMM yyyy ''at'' HH:mm:ss')})}"/>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.areaOfLaw}, ${claimSummary.areaOfLaw})}"/>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.categoryOfLaw}, ${claimSummary.categoryOfLaw})}"/>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.feeCode}, ${claimSummary.feeCode})}"/>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.feeCodeDescription}, ${claimSummary.feeCodeDescription})}"/>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.matterType1}, ${claimSummary.matterType1})}"/>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.matterType2}, ${claimSummary.matterType2})}"/>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.caseStartDate}, ${#temporals.format(claimSummary.caseStartDate, 'dd/MM/yyyy')})}"/>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.caseEndDate}, ${#temporals.format(claimSummary.caseConcludedDate, 'dd/MM/yyyy')})}"/>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.escapeCase}, ${claimSummary.isEscaped ? 'Yes' : 'No'})}"/>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.vatRequested}, ${claimSummary.isVatApplicable ? 'Yes' : 'No'})}"/>
                                </th:block>


                                <th:block th:if="${claimSummary.areaOfLaw == 'CRIME LOWER'}">
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.clientSurname}, ${claimSummary.clientSurname})}"/>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.clientInitial}, ${claimSummary.clientForename})}"/>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.ufn}, ${claimSummary.uniqueFileNumber})}"/>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.officeAccount}, ${claimSummary.officeAccountNumber})}"/>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.dateSubmitted}, ${#temporals.format(claimSummary.submissionDate, 'd MMMM yyyy ''at'' HH:mm:ss')})}"/>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.areaOfLaw}, ${claimSummary.areaOfLaw})}"/>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.categoryOfLaw}, ${claimSummary.categoryOfLaw})}"/>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.feeCode}, ${claimSummary.feeCode})}"/>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.feeCodeDescription}, ${claimSummary.feeCodeDescription})}"/>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.matterType}, ${claimSummary.matterTypeCode})}"/>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.stageReached}, ${claimSummary.stageReachedCode})}"/>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.outcomeCode}, ${claimSummary.outcomeCode})}"/>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.caseStartDate}, ${#temporals.format(claimSummary.caseStartDate, 'dd/MM/yyyy')})}"/>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.dateOfWorkConcluded}, ${#temporals.format(claimSummary.caseConcludedDate, 'dd/MM/yyyy')})}"/>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.escapeCase}, ${claimSummary.isEscaped ? 'Yes' : 'No'})}"/>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.vatRequested}, ${claimSummary.isVatApplicable ? 'Yes' : 'No'})}"/>
                                </th:block>


                                <th:block th:if="${claimSummary.areaOfLaw == 'MEDIATION'}">
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.client1Name}, ${claimSummary.clientForename + ' ' + claimSummary.clientSurname})}"/>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.client1Ucn}, ${claimSummary.uniqueFileNumber})}"/>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.client2Name}, ${claimSummary.client2Forename + ' ' + claimSummary.client2Surname})}"/>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.client2Ucn}, ${claimSummary.uniqueClientNumber})}"/>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.officeAccount}, ${claimSummary.officeAccountNumber})}"/>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.dateSubmitted}, ${#temporals.format(claimSummary.submissionDate, 'd MMMM yyyy ''at'' HH:mm:ss')})}"/>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.areaOfLaw}, ${claimSummary.areaOfLaw})}"/>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.categoryOfLaw}, ${claimSummary.categoryOfLaw})}"/>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.feeCode}, ${claimSummary.feeCode})}"/>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.feeCodeDescription}, ${claimSummary.feeCodeDescription})}"/>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.matterType1}, ${claimSummary.matterType1})}"/>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.matterType2}, ${claimSummary.matterType2})}"/>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.caseStartDate}, ${#temporals.format(claimSummary.caseStartDate, 'dd/MM/yyyy')})}"/>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.caseEndDate}, ${#temporals.format(claimSummary.caseConcludedDate, 'dd/MM/yyyy')})}"/>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.escapeCase}, ${claimSummary.isEscaped ? 'Yes' : 'No'})}"/>
                                    <th:block
                                            th:replace="~{::summary-row(#{submission.summary.claims.table.vatRequested}, ${claimSummary.isVatApplicable ? 'Yes' : 'No'})}"/>
                                </th:block>

                            </dl>
                        </div>
                    </div>
                </div>
            </div>
            <div class="govuk-grid-row">
                <div class="govuk-grid-column-full">
                    <div class="govuk-summary-card">
                        <div class="govuk-summary-card__title-wrapper">
                            <h2 class="govuk-summary-card__title"
                                th:text="#{viewClaim.feeCalculation.subheading}"/>
                        </div>
                        <div class="govuk-summary-card__content">
                            <table class="govuk-table">
                                <thead class="govuk-table__head">
                                <tr class="govuk-table__row">
                                    <th scope="col" class="govuk-table__header"
                                        th:text="#{viewClaim.feeCalculation.columnTitle.item}"/>
                                    <th scope="col" class="govuk-table__header govuk-table__header--numeric"
                                        th:text="#{viewClaim.feeCalculation.columnTitle.calculated}"/>
                                    <th scope="col" class="govuk-table__header govuk-table__header--numeric"
                                        th:text="#{viewClaim.feeCalculation.columnTitle.entered}"/>
                                    <th scope="col" class="govuk-table__header"
                                        th:text="#{viewClaim.feeCalculation.columnTitle.notes}"/>
                                </tr>
                                </thead>
                                <tbody class="govuk-table__body">
                                <th:block
                                        th:replace="~{::fee-detail-row(#{viewClaim.feeCalculation.row.fixedFee},
              ${feeDetails.fixedFee}, null, true)}"/>
                                <th:block
                                        th:replace="~{::fee-detail-row(#{viewClaim.feeCalculation.row.profitCost},
              ${feeDetails.netProfitCost}, null, true)}"/>
                                <th:block
                                        th:replace="~{::fee-detail-row(#{viewClaim.feeCalculation.row.disbursements},
              ${feeDetails.netDisbursments}, null, true)}"/>
                                <th:block
                                        th:replace="~{::fee-detail-row(#{viewClaim.feeCalculation.row.disbursementVat},
              ${feeDetails.disbursementVat}, null, true)}"/>
                                <th:block
                                        th:replace="~{::fee-detail-row(#{viewClaim.feeCalculation.row.counselCost},
              ${feeDetails.netCostOfCounsel},
              #{viewClaim.feeCalculation.notes.immigrationAsylumDiscriminationOnly}, true)}"/>
                                <th:block th:if="${claimSummary.areaOfLaw == 'LEGAL HELP'}">
                                    <th:block
                                            th:replace="~{::fee-detail-row(#{viewClaim.feeCalculation.row.travelAndWaitingCosts},
                ${feeDetails.travelAndWaitingCosts},
                #{viewClaim.feeCalculation.notes.legalHelpOnly}, true)}"/>
                                </th:block>
                                <th:block th:if="${claimSummary.areaOfLaw == 'CRIME LOWER'}">
                                    <th:block
                                            th:replace="~{::fee-detail-row(#{viewClaim.feeCalculation.row.travelCosts},
              ${feeDetails.travelCosts},
              #{viewClaim.feeCalculation.notes.crimeOnly}, true)}"/>
                                    <th:block
                                            th:replace="~{::fee-detail-row(#{viewClaim.feeCalculation.row.waitingCosts},
              ${feeDetails.waitingCosts},
              #{viewClaim.feeCalculation.notes.crimeOnly}, true)}"/>
                                </th:block>
                                <th:block
                                        th:replace="~{::fee-detail-row(#{viewClaim.feeCalculation.row.detentionTravelWaitingCosts},
              ${feeDetails.detentionTravelAndWaitingCosts},
              #{viewClaim.feeCalculation.notes.immigrationAsylumOnly}, true)}"/>
                                <th:block
                                        th:replace="~{::fee-detail-row(#{viewClaim.feeCalculation.row.jrFormFilling},
              ${feeDetails.jrFormFilling},
              #{viewClaim.feeCalculation.notes.immigrationAsylumOnly}, true)}"/>
                                <th:block
                                        th:replace="~{::fee-detail-row(#{viewClaim.feeCalculation.row.adjournedHearingFee},
              ${feeDetails.adjournedHearingFee},
              #{viewClaim.feeCalculation.notes.immigrationAsylumMentalHealthOnly}, false)}"/>
                                <th:block
                                        th:replace="~{::fee-detail-row(#{viewClaim.feeCalculation.row.cmrhTelephone},
              ${feeDetails.cmrhTelephone},
              #{viewClaim.feeCalculation.notes.immigrationAsylumOnly}, false)}"/>
                                <th:block
                                        th:replace="~{::fee-detail-row(#{viewClaim.feeCalculation.row.cmrhOral},
              ${feeDetails.cmrhOral},
              #{viewClaim.feeCalculation.notes.immigrationAsylumOnly}, false)}"/>
                                <th:block
                                        th:replace="~{::fee-detail-row(#{viewClaim.feeCalculation.row.homeOfficeInterview},
              ${feeDetails.homeOfficeInterview},
              #{viewClaim.feeCalculation.notes.immigrationAsylumOnly}, false)}"/>
                                <th:block
                                        th:replace="~{::fee-detail-row(#{viewClaim.feeCalculation.row.substantiveHearing},
              ${feeDetails.substantiveHearing},
              #{viewClaim.feeCalculation.notes.immigrationAsylumOnly}, true)}"/>
                                <tr class="govuk-table__row">
                                    <th scope="row" class="govuk-table__header "
                                        th:text="#{viewClaim.feeCalculation.row.vat}"/>
                                    <td class="govuk-table__cell govuk-table__cell--numeric"
                                        th:text="${feeDetails.vatIndicator ? 'Yes' : 'No'}"/>
                                    <td class="govuk-table__cell govuk-table__cell--numeric"
                                        th:text="${claimSummary.isVatApplicable ? 'Yes' : 'No'}"/>
                                    <td class="govuk-table__cell"></td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
            <div class="govuk-grid-row">
                <div class="govuk-grid-column-full">
                    <div class="govuk-summary-card">
                        <div class="govuk-summary-card__title-wrapper">
                            <h2 class="govuk-summary-card__title"
                                th:text="#{viewClaim.feeCalculation.total.subheading}"/>
                        </div>
                        <div class="govuk-summary-card__content">
                            <table class="govuk-table">
                                <thead class="govuk-table__head">
                                <tr class="govuk-table__row">
                                    <th scope="col" class="govuk-table__header"
                                        th:text="#{viewClaim.feeCalculation.columnTitle.item}"/>
                                    <th scope="col" class="govuk-table__header govuk-table__header--numeric"
                                        th:text="#{viewClaim.feeCalculation.columnTitle.calculated}"/>
                                    <th scope="col" class="govuk-table__header govuk-table__header--numeric"
                                        th:text="#{viewClaim.feeCalculation.columnTitle.entered}"/>
                                </tr>
                                </thead>
                                <tbody class="govuk-table__body">

                                <tr class="govuk-table__row">
                                    <th scope="row" class="govuk-table__header"
                                        th:text="#{viewClaim.feeCalculation.row.assessedTotalVAT}"></th>

                                    <td class="govuk-table__cell govuk-table__cell--numeric"
                                        th:text="|£${feeDetails.vat.calculatedValue}|"></td>

                                    <td class="govuk-table__cell govuk-table__cell--numeric"
                                        th:aria-label="#{viewClaim.feeCalculation.na}"
                                        th:text="#{viewClaim.feeCalculation.na}"></td>
                                </tr>
                                <tr class="govuk-table__row">
                                    <th scope="row" class="govuk-table__header"
                                        th:text="#{viewClaim.feeCalculation.row.assessedTotalInclVat}"></th>
                                    <td class="govuk-table__cell govuk-table__cell--numeric"
                                        th:text="|£${feeDetails.calculatedTotal}|"></td>
                                    <td class="govuk-table__cell govuk-table__cell--numeric"
                                        th:aria-label="#{viewClaim.feeCalculation.na}"
                                        th:text="#{viewClaim.feeCalculation.na}"></td>
                                </tr>

                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</html>
