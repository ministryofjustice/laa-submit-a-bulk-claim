<th:block th:fragment="sortableHeader(sortField,navTab,headerName)">

    <th scope="col" class="govuk-table__header" aria-sort="none"
        th:with="
                selectedSort=${currentSort?:null},
                isThisFieldSorted=${selectedSort != null and #strings.startsWith(selectedSort, sortField + ',')},
                currentDir=${isThisFieldSorted ? #strings.substringAfter(selectedSort, sortField + ',') : null},
                nextDir=${!isThisFieldSorted or currentDir == 'desc' ? 'asc' : 'desc'},
                sortValue=${sortField + ',' + nextDir},
                claimDetailsUrl=@{/view-submission-detail(navTab=${navTab}, submissionId=${submissionId})},
                sortUrl=${@thymeleafHrefUtils.build(claimDetailsUrl, 'page', 0, 'sort', sortValue)}
                " >
        <a class="govuk-link app-sort-link govuk-link--no-visited-state govuk-link--no-underline govuk-link--sort" th:href="${sortUrl}+'#claims-table'">
            <span th:text="#{${headerName}}"> </span>
            <th:block th:replace="~{fragments/sort-arrow :: sortArrow(${isThisFieldSorted},${currentDir})}"></th:block>
        </a>
    </th>

</th:block>

<th:block th:fragment="submissionSearchSortableHeader(sortField,headerName,submissionSearchForm)">

  <th scope="col" class="govuk-table__header" aria-sort="none"
      th:with="
        selectedSort=${currentSort?:null},
        isThisFieldSorted=${selectedSort != null and #strings.startsWith(selectedSort, sortField + ',')},
        currentDir=${isThisFieldSorted ? #strings.substringAfter(selectedSort, sortField + ',') : null},
        nextDir=${!isThisFieldSorted or currentDir == 'desc' ? 'asc' : 'desc'},
        sortValue=${sortField + ',' + nextDir},
        searchResultsUrl=@{/submissions/search/results},
        sortUrl=${@thymeleafHrefUtils.build(
          searchResultsUrl,
          'page', 0,
          'sort', sortValue,
          'submissionPeriod', submissionSearchForm.submissionPeriod,
          'areaOfLaw', submissionSearchForm.areaOfLaw,
          'offices', submissionSearchForm.offices,
          'submissionStatuses', submissionSearchForm.submissionStatuses
        )}
      ">

    <a class="govuk-link app-sort-link govuk-link--no-visited-state govuk-link--no-underline govuk-link--sort"
       th:href="${sortUrl} + '#claims-table'">
      <span th:text="#{${headerName}}"> </span>
      <th:block th:replace="~{fragments/sort-arrow :: sortArrow(${isThisFieldSorted},${currentDir})}"></th:block>
    </a>

  </th>

</th:block>
