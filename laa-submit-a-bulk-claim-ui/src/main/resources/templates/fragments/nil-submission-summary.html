<th:block th:fragment="nil-submission-summary"
          th:if="${nilSubmissionForm != null}" xmlns:th="http://www.w3.org/1999/xhtml">
    <table class="govuk-table">
        <tbody class="govuk-table__body">
        <tr class="govuk-table__row" th:if="${nilSubmissionForm.office != null}">
            <td class="govuk-table__cell govuk-!-font-weight-bold" th:text="#{nilSubmission.office.changeValue}"></td>
            <td class="govuk-table__cell" th:text="${nilSubmissionForm.office}"></td>
            <td class="govuk-table__cell">
                <a
                        th:if="${nilSubmissionForm.officeCount > 1}"
                        th:href="@{/nil-submission-office}"
                        class="govuk-link govuk-link--no-visited-state"
                        th:text="#{nilSubmission.changeLink}">
                </a>
                <span
                        th:if="${nilSubmissionForm.officeCount <= 1}">&nbsp;
                </span>
            </td>
        </tr>
        <tr class="govuk-table__row" th:if="${nilSubmissionForm.areaOfLaw != null}">
            <td class="govuk-table__cell govuk-!-font-weight-bold"
                th:text="#{nilSubmission.areaOfLaw.changeValue}"></td>
            <td class="govuk-table__cell" th:text="${nilSubmissionForm.getAreaOfLawDisplayText()}"></td>
            <td class="govuk-table__cell">
                <a
                        th:href="@{/nil-submission-areaoflaw}"
                        th:data-testid="nil-submission-areaoflaw"
                        class="govuk-link govuk-link--no-visited-state"
                        th:text="#{nilSubmission.changeLink}">
                </a>
            </td>
        </tr>
        <tr class="govuk-table__row" th:if="${nilSubmissionForm.submissionPeriod != null}">
            <td class="govuk-table__cell govuk-!-font-weight-bold" th:text="#{nilSubmission.period.changeValue}"></td>
            <td class="govuk-table__cell" th:text="${nilSubmissionForm.submissionPeriod}"></td>
            <td class="govuk-table__cell">
                <a
                        th:href="@{/nil-submission-period}"
                        th:data-testid="nil-submission-submission-period"
                        class="govuk-link govuk-link--no-visited-state"
                        th:text="#{nilSubmission.changeLink}">
                </a>
            </td>
        </tr>
        <tr class="govuk-table__row" th:if="${nilSubmissionForm.scheduleReference != null}">
            <td class="govuk-table__cell govuk-!-font-weight-bold" th:text="${referenceLabel}"></td>
            <td class="govuk-table__cell" th:text="${nilSubmissionForm.scheduleReference}"></td>
            <td class="govuk-table__cell">
                <a
                        th:href="@{/nil-submission-reference}"
                        th:data-testid="nil-submission-schedule-reference"
                        class="govuk-link govuk-link--no-visited-state"
                        th:text="#{nilSubmission.changeLink}">
                </a>
            </td>
        </tr>
        </tbody>
    </table>
</th:block>
