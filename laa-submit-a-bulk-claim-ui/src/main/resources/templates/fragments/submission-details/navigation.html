<th:block th:fragment="navigation(claimCount, messageCount, matterStartsCount)">
  <div class="govuk-grid-column-full">
    <nav class="moj-sub-navigation" aria-label="Sub navigation">
      <ul class="moj-sub-navigation__list"
          th:with="baseUrl=@{/view-submission-detail(submissionId=${submissionSummary.submissionReference})}">
        <li class="moj-sub-navigation__item">
          <a class="moj-sub-navigation__link"
             th:with="isCurrent=${navTab == 'CLAIM_DETAILS'},
              url=@{${baseUrl}(navTab='CLAIM_DETAILS')}"
             th:attr="aria-current=${isCurrent ? 'page' : null}"
             th:href="${isCurrent ? '#claims' : url}"
             th:text="#{submission.summary.nav.claims(${claimCount})}"></a>
        </li>
        <li class="moj-sub-navigation__item" th:if="${messagesSummary != null}">
          <a class="moj-sub-navigation__link"
             th:with="isCurrent=${navTab == 'CLAIM_MESSAGES'},
              url=@{${baseUrl}(navTab='CLAIM_MESSAGES')}"
             th:attr="aria-current=${isCurrent ? 'page' : null}"
             th:href="${isCurrent ? '#messages' : url}"
             th:text="#{submission.summary.nav.messages(${messageCount})}"></a>
        </li>
        <li class="moj-sub-navigation__item"
            th:unless="${isCrimeLower}">
          <a class="moj-sub-navigation__link"
             th:with="isCurrent=${navTab == 'MATTER_STARTS'},
              url=@{${baseUrl}(navTab='MATTER_STARTS')}"
             th:attr="aria-current=${isCurrent ? 'page' : null}"
             th:href="${isCurrent ? '#matter-starts' : url}"
             th:text="#{submission.summary.nav.matterStarts(${matterStartsCount})}"></a>
        </li>
      </ul>
    </nav>
  </div>
</th:block>
