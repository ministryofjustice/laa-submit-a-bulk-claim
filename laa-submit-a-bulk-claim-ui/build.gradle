plugins {
    id 'io.freefair.lombok' version '9.2.0'
    id("com.diffplug.spotless") version "7.2.1"
    id 'au.com.dius.pact' version '4.6.19'
    id "io.sentry.jvm.gradle" version "5.12.2"
}

def versions = [sentry : '8.31.0']
apply plugin: 'uk.gov.laa.springboot.laa-spring-boot-gradle-plugin'


checkstyle {
    toolVersion = '13.0.0'
    configFile = file("${rootDir}/config/checkstyle/checkstyle.xml")
}
repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}



dependencyManagement {
    dependencies {
        dependencySet(group: 'io.sentry', version: versions.sentry) {
            entry 'sentry-spring-boot-starter'
            entry 'sentry-log4j2'
        }
    }
}

// To keep pact/accessibility stuff seperate
sourceSets {
    pactTest {
        java.srcDir file('src/pactTest/java')
        resources.srcDir file('src/pactTest/resources')
        compileClasspath += sourceSets.main.output + configurations.testRuntimeClasspath
        runtimeClasspath += sourceSets.main.output + configurations.testRuntimeClasspath
    }
    accessibilityTest {
        java.srcDir file('src/accessibilityTest/java')
        resources.srcDir file('src/accessibilityTest/resources')
        compileClasspath += sourceSets.main.output + configurations.testRuntimeClasspath
        runtimeClasspath += sourceSets.main.output + configurations.testRuntimeClasspath
    }
}

dependencies {
    // Upgrade to fix vulnerability GHSA-72hv-8253-57qq
    implementation 'com.fasterxml.jackson.core:jackson-core:2.21.2'
    implementation 'tools.jackson.core:jackson-core:3.1.1'

    implementation 'uk.gov.justice.laa.datastewardship.payments:data-claims-api-models:1.0.17'
    
    compileOnly 'io.swagger.core.v3:swagger-annotations:2.2.30'

    implementation 'org.springframework.boot:spring-boot-starter-cache'
    implementation 'org.springframework.boot:spring-boot-starter-oauth2-client'
    implementation 'org.springframework.boot:spring-boot-starter-restclient'
    implementation 'org.springframework.boot:spring-boot-starter-security'
    implementation 'org.springframework.boot:spring-boot-starter-thymeleaf'
    implementation 'org.springframework.boot:spring-boot-starter-webmvc'
    implementation 'org.springframework.boot:spring-boot-starter-webflux'
    implementation 'org.springframework.boot:spring-boot-starter-log4j2'
    implementation 'org.reactivestreams:reactive-streams:1.0.4'
    implementation 'org.thymeleaf.extras:thymeleaf-extras-springsecurity6:3.1.3.RELEASE'

    implementation 'org.apache.commons:commons-lang3'
    // Front end
    // https://mvnrepository.com/artifact/org.webjars/webjars-locator-lite
    implementation 'org.webjars:webjars-locator-lite'
    // https://mvnrepository.com/artifact/org.webjars.npm/govuk-frontend
    implementation 'org.webjars.npm:govuk-frontend:5.13.0'
    implementation 'org.webjars.npm:ministryofjustice__frontend:5.1.5'
    implementation 'org.webjars.npm:accessible-autocomplete:3.0.1'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'io.prometheus:prometheus-metrics-tracer-initializer'
    implementation 'io.micrometer:micrometer-registry-prometheus'

    implementation 'org.mapstruct:mapstruct:1.6.3'
    annotationProcessor 'org.mapstruct:mapstruct-processor:1.6.3'

    implementation 'org.springframework.boot:spring-boot-starter-data-redis'
    implementation 'org.springframework.session:spring-session-data-redis'
    // Sentry
    implementation platform("io.sentry:sentry-bom:$versions.sentry")
    implementation "io.sentry:sentry-log4j2:$versions.sentry"
    implementation "io.sentry:sentry-spring-boot-4:$versions.sentry"

    developmentOnly 'org.springframework.boot:spring-boot-devtools'

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.boot:spring-boot-starter-restclient-test'
    testImplementation 'org.springframework.boot:spring-boot-starter-cache-test'
    testImplementation 'org.springframework.boot:spring-boot-starter-security-oauth2-client-test'

    testImplementation 'org.springframework.boot:spring-boot-starter-webmvc-test'
    testImplementation 'org.springframework.security:spring-security-test'

    testImplementation 'org.testcontainers:mockserver:1.21.3'
    testImplementation 'org.mock-server:mockserver-client-java:5.15.0'

    testImplementation 'au.com.dius.pact.consumer:junit5:4.6.19'

    accessibilityTestImplementation 'com.microsoft.playwright:playwright:1.56.0'
    accessibilityTestImplementation 'com.deque.html.axe-core:playwright:4.10.2'
    accessibilityTestImplementation 'org.springframework.boot:spring-boot-starter-test'
    accessibilityTestImplementation 'org.wiremock:wiremock-standalone:3.13.1'
}


configurations {
    all {
        exclude group: 'org.springframework.boot', module: 'spring-boot-starter-logging'
    }

    pactTestImplementation.extendsFrom testImplementation
    pactTestRuntimeOnly.extendsFrom testRuntimeOnly
    accessibilityTestImplementation.extendsFrom testImplementation
    accessibilityTestRuntimeOnly.extendsFrom testRuntimeOnly
}

tasks.register('pactTest', Test) {

    systemProperty "pact.content_type.override.application/json", "application/json;charset=utf-8"

    description = 'Runs the pact tests.'
    group = 'verification'

    def pactsDir = layout.buildDirectory.dir("pacts").get().asFile
    doFirst {
        if (pactsDir.exists()) {
            pactsDir.deleteDir()
        }
    }

    testClassesDirs = sourceSets.pactTest.output.classesDirs
    classpath = sourceSets.pactTest.runtimeClasspath
    useJUnitPlatform()
    // Resolve the directory path to a String for the system property
    systemProperty 'pact.rootDir', layout.buildDirectory.dir("pacts").get().asFile.path
}

tasks.register('accessibilityTest', Test) {

    description = 'Runs the accessibility tests.'
    group = 'verification'

    testClassesDirs = sourceSets.accessibilityTest.output.classesDirs
    classpath = sourceSets.accessibilityTest.runtimeClasspath
    useJUnitPlatform()

    systemProperty(
            'accessibility.headless',
            System.getProperty(
                    'accessibility.headless',
                    System.getenv('ACCESSIBILITY_HEADLESS') ?: 'true'
            )
    )

    def configuredParallelForks =
            System.getProperty('accessibility.maxParallelForks')
                    ?: System.getenv('ACCESSIBILITY_MAX_PARALLEL_FORKS')
    maxParallelForks = configuredParallelForks
            ? Integer.parseInt(configuredParallelForks)
            : Math.max(1, (Runtime.runtime.availableProcessors() / 2) as int)

    reports {
        junitXml.required = true
        html.required = true
    }
}

tasks.named('processPactTestResources') {
    duplicatesStrategy = DuplicatesStrategy.INCLUDE
}

tasks.named('processAccessibilityTestResources') {
    duplicatesStrategy = DuplicatesStrategy.INCLUDE
}


test {
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()
    finalizedBy jacocoTestReport
}

jacocoTestReport {
    afterEvaluate {
        classDirectories.setFrom(files(classDirectories.files.collect {
            fileTree(dir: it, exclude: ['**/BulkUploadApplication.class', '**/*Config.class', '**/*Dto.class'])
        }))
    }
}

jacocoTestCoverageVerification {
    afterEvaluate {
        classDirectories.setFrom(files(classDirectories.files.collect {
            fileTree(dir: it, exclude: ['**/BulkUploadApplication.class', '**/*Config.class', '**/*Dto.class'])
        }))
    }

    violationRules {
        /*CwaUploadService fails this check, but due to how the tests have been written. This class
            will be removed in the future so for the time being I have disabled this until the
            codebase has been fleshed out.*/
        failOnViolation = false

        rule {
            element = 'CLASS'
            limit {
                counter = 'LINE'
                minimum = 0.75
            }
        }
    }
}

check.dependsOn jacocoTestCoverageVerification

spotless {
    java {
        target 'src/*/java/**/*.java'
        importOrder()
        removeUnusedImports()
        cleanthat()
        googleJavaFormat('1.33.0')
    }
}


pact {
    publish {
        pactBrokerUrl = project.findProperty('pactBrokerUrl') ?: System.getenv('PACT_BROKER_URL') ?: 'https://laa-data-pact-broker.apps.live.cloud-platform.service.justice.gov.uk/'
        pactBrokerUsername = project.findProperty('pactBrokerUsername') ?: System.getenv('PACT_BROKER_USERNAME') ?: 'ABC'
        pactBrokerPassword = project.findProperty('pactBrokerPassword') ?: System.getenv('PACT_BROKER_PASSWORD') ?: 'ABC'

        pactDirectory = layout.buildDirectory.dir("pacts").get().asFile.path

        def projectVersion = project.version != 'unspecified' ? project.version : '1.0.0';
        def gitSha = providers.environmentVariable('GIT_SHA').getOrNull()
        // Define the branch from a property, environment variable, or fallback to 'main'
        def branchName = providers.environmentVariable('GIT_BRANCH').getOrElse('main')

        // If we have a SHA, append it to the version for uniqueness
        consumerVersion = gitSha ? gitSha : projectVersion

        // For newer Pact Brokers (Recommended)
        consumerBranch = branchName

        // For older Brokers/compatibility
        tags = [branchName, projectVersion]


        // Add 'release' tag if branchName matches semantic version pattern (X.X.XXX)
        if (branchName ==~ /\d+\.\d+\.\d+/) {
            tags.add('release')
        }
        // Optional: add a generic 'dev' tag for anything not on main
        else if (branchName != 'main' && branchName != 'master') {
            tags.add('dev')
        }

        def pactTagsInput = providers.environmentVariable('PACT_TAGS').getOrNull()
        if (pactTagsInput) {
            pactTagsInput.split(',').each { tag ->
                tags.add(tag.trim())
            }
        }


    }
}

tasks.register('checkstyleAll') {
    group = 'verification'
    description = 'Runs checkstyleMain'
    dependsOn tasks.matching { it.name in ['checkstyleMain'] }
}

tasks.named('build') {
    dependsOn tasks.named('checkstyleAll')
}


tasks.compileJava {
    options.compilerArgs.addAll(['-Xlint:deprecation', '-Xlint:unchecked'])
}
